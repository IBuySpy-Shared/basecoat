global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'basecoat-staging'
    environment: 'staging'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - 'performance-alerts.yml'

scrape_configs:
  # k6 Load Testing Tool - Real-time test metrics
  - job_name: 'k6'
    static_configs:
      - targets: ['localhost:6565']
    scrape_interval: 5s
    scrape_timeout: 3s

  # Basecoat Portal API Server
  - job_name: 'basecoat-api'
    static_configs:
      - targets: ['staging-api.basecoat.dev:9090']
    scrape_interval: 15s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'http_requests_total|http_request_duration_ms|http_request_failed'
        action: keep

  # PostgreSQL Database
  - job_name: 'postgres'
    static_configs:
      - targets: ['staging-db.basecoat.dev:9187']
    scrape_interval: 15s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pg_stat_.*|pg_slow_queries.*|pg_up'
        action: keep

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['staging-redis.basecoat.dev:9121']
    scrape_interval: 15s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_.*|redis_up'
        action: keep

  # Node Exporter (Infrastructure metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'staging-api.basecoat.dev:9100'
          - 'staging-db.basecoat.dev:9100'
          - 'staging-redis.basecoat.dev:9100'
    scrape_interval: 15s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_cpu.*|node_memory.*|node_network.*|node_disk.*|node_up'
        action: keep
