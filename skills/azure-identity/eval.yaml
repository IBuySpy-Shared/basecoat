name: "azure-identity-routing"
description: "Routing evaluation — validates trigger activation for the azure-identity skill."
skill: "skills/azure-identity/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "How do I assign the correct Azure RBAC roles so my app can read from a storage account?"
    expect_activation: true
  - id: "pos-2"
    input: "Configure a managed identity for my Azure App Service so it can access Key Vault without secrets"
    expect_activation: true
  - id: "pos-3"
    input: "Set up GitHub OIDC federation so my Actions workflows can authenticate to Azure without storing credentials"
    expect_activation: true
  - id: "neg-1"
    input: "Reset a user's local Active Directory password on our on-premises domain controller"
    expect_activation: false
  - id: "neg-2"
    input: "How do I set up IAM roles in AWS for an EC2 instance?"
    expect_activation: false
