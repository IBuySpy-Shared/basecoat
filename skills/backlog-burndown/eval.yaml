name: "backlog-burndown-routing"
description: "Routing evaluation — validates trigger activation for the backlog-burndown skill."
skill: "skills/backlog-burndown/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Create a sprint backlog burn-down update and flag scope creep risk for this week."
    expect_activation: true
  - id: "pos-2"
    input: "Analyze remaining issues vs days left and tell me if we are likely to spill over."
    expect_activation: true
  - id: "pos-3"
    input: "Generate a daily backlog health report with blockers, velocity trend, and recommended triage actions."
    expect_activation: true
  - id: "neg-1"
    input: "Write a React component for the dashboard sidebar."
    expect_activation: false
  - id: "neg-2"
    input: "Draft a year-long product roadmap for five business units."
    expect_activation: false
