name: "azure-networking-routing"
description: "Routing evaluation — validates trigger activation for the azure-networking skill."
skill: "skills/azure-networking/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Design a hub-spoke VNet topology for our Azure environment with shared services in the hub"
    expect_activation: true
  - id: "pos-2"
    input: "Set up private endpoints and Private DNS zones so our app can reach Azure SQL without public internet"
    expect_activation: true
  - id: "pos-3"
    input: "Create an NSG rule matrix for our three-tier application subnets"
    expect_activation: true
  - id: "neg-1"
    input: "Assign RBAC roles so a developer can read secrets from Key Vault"
    expect_activation: false
  - id: "neg-2"
    input: "Write the Kubernetes Deployment and Service manifests for my web app"
    expect_activation: false
