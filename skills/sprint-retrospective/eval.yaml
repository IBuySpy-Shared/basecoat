name: "sprint-retrospective-routing"
description: "Routing evaluation — validates trigger activation for the sprint-retrospective skill."
skill: "skills/sprint-retrospective/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Generate a sprint retrospective document for our last two-week sprint with metrics and improvement actions."
    expect_activation: true
  - id: "pos-2"
    input: "Summarize our merged PRs and closed issues from the last sprint and analyze time-to-merge trends."
    expect_activation: true
  - id: "pos-3"
    input: "Identify rework patterns and PR size issues from this sprint's data and suggest improvements."
    expect_activation: true
  - id: "neg-1"
    input: "Help me estimate story points and plan capacity for the upcoming sprint."
    expect_activation: false
  - id: "neg-2"
    input: "Help me write a unit test for this authentication function."
    expect_activation: false
