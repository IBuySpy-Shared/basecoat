name: "documentation-routing"
description: "Routing evaluation — validates trigger activation for the documentation skill."
skill: "skills/documentation/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Write a README for this project covering installation, usage, and contributing guidelines."
    expect_activation: true
  - id: "pos-2"
    input: "Record an architecture decision for why we chose Postgres over MongoDB."
    expect_activation: true
  - id: "pos-3"
    input: "Create an operational runbook for restarting the payment service after an outage."
    expect_activation: true
  - id: "neg-1"
    input: "Refactor the authentication module to use dependency injection."
    expect_activation: false
  - id: "neg-2"
    input: "How do I parse a JSON file in Python?"
    expect_activation: false
