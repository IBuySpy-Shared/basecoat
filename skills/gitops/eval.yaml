name: "gitops-routing"
description: "Routing evaluation — validates trigger activation for the gitops skill."
skill: "skills/gitops/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Walk me through setting up a Flux GitOps workflow for deploying to our Kubernetes cluster."
    expect_activation: true
  - id: "pos-2"
    input: "How should I structure multi-environment Kubernetes manifests across dev, staging, and prod with ArgoCD?"
    expect_activation: true
  - id: "pos-3"
    input: "Our cluster keeps drifting from desired state — what's the best way to handle drift reconciliation with GitOps?"
    expect_activation: true
  - id: "neg-1"
    input: "Write a kubectl runbook for manually rolling back a deployment in an emergency."
    expect_activation: false
  - id: "neg-2"
    input: "Explain how bubble sort works."
    expect_activation: false
