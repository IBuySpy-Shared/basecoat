name: "security-routing"
description: "Routing evaluation — validates trigger activation for the security skill."
skill: "skills/security/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Run an OWASP security review on this codebase and highlight the top vulnerabilities."
    expect_activation: true
  - id: "pos-2"
    input: "Create a STRIDE threat model for our authentication service."
    expect_activation: true
  - id: "pos-3"
    input: "Scan the repo for hardcoded secrets and audit our dependencies for known CVEs."
    expect_activation: true
  - id: "neg-1"
    input: "We have an active incident — a service is down and customers can't log in, help us respond."
    expect_activation: false
  - id: "neg-2"
    input: "Why is this endpoint taking 3 seconds to respond? Help me tune the performance."
    expect_activation: false
