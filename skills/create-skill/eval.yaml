name: "create-skill-routing"
description: "Routing evaluation — validates trigger activation for the create-skill skill."
skill: "skills/create-skill/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "I want to add a new SKILL.md for a database migration workflow to this repo."
    expect_activation: true
  - id: "pos-2"
    input: "Help me design the trigger phrases and frontmatter for a skill that handles API versioning."
    expect_activation: true
  - id: "pos-3"
    input: "Scaffold the skill folder structure and templates for a new observability skill."
    expect_activation: true
  - id: "neg-1"
    input: "Add a new instructions file to enforce our Python docstring standards."
    expect_activation: false
  - id: "neg-2"
    input: "Fix the bug in the payment service checkout flow."
    expect_activation: false
