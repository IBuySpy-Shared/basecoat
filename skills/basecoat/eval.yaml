name: "basecoat-routing"
description: "Routing evaluation — validates trigger activation for the basecoat skill."
skill: "skills/basecoat/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Which BaseCoat agent should I use for designing a new API?"
    expect_activation: true
  - id: "pos-2"
    input: "Browse the BaseCoat agent catalog and show me what's available for infrastructure tasks"
    expect_activation: true
  - id: "pos-3"
    input: "I want to delegate this backend task to the right discipline — which agent handles that?"
    expect_activation: true
  - id: "neg-1"
    input: "Edit the internals of the api-security skill to add a new pattern"
    expect_activation: false
  - id: "neg-2"
    input: "Install the latest version of the Azure CLI on my machine"
    expect_activation: false
