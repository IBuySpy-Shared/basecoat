name: "human-in-the-loop-routing"
description: "Routing evaluation — validates trigger activation for the human-in-the-loop skill."
skill: "skills/human-in-the-loop/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "I want to add a human approval gate before the agent pushes any changes to production."
    expect_activation: true
  - id: "pos-2"
    input: "How do I define escalation triggers so risky automation pauses and waits for a human review?"
    expect_activation: true
  - id: "pos-3"
    input: "Design an async human review workflow where the agent defers a destructive action until someone approves it."
    expect_activation: true
  - id: "neg-1"
    input: "This task is low-risk and well-understood — just have the agent run it fully automatically."
    expect_activation: false
  - id: "neg-2"
    input: "What are the OSI model layers?"
    expect_activation: false
