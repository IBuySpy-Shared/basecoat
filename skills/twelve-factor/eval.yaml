name: "twelve-factor-routing"
description: "Routing evaluation — validates trigger activation for the twelve-factor skill."
skill: "skills/twelve-factor/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Move our database credentials and feature flags from the source code into environment variables."
    expect_activation: true
  - id: "pos-2"
    input: "Check whether our application's processes are stateless and review how we separate build, release, and run stages."
    expect_activation: true
  - id: "pos-3"
    input: "Verify that all our application logs are written to stdout and assess parity between dev and prod."
    expect_activation: true
  - id: "neg-1"
    input: "Adjust the pixel spacing on the login form and update the button color to match the brand guidelines."
    expect_activation: false
  - id: "neg-2"
    input: "Compare pricing across AWS, Azure, and GCP for hosting our new service."
    expect_activation: false
