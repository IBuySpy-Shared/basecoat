name: "handoff-routing"
description: "Routing evaluation — validates trigger activation for the handoff skill."
skill: "skills/handoff/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "I'm ending my session — create a handoff document so the next agent can pick up where I left off."
    expect_activation: true
  - id: "pos-2"
    input: "Summarize the unfinished work and next steps so another developer can take over this task."
    expect_activation: true
  - id: "pos-3"
    input: "Package the deployment context, commands run, and any blockers into a handoff for the ops team."
    expect_activation: true
  - id: "neg-1"
    input: "Write a public-facing changelog entry for the features we shipped in this sprint."
    expect_activation: false
  - id: "neg-2"
    input: "How do I reverse a string in Go?"
    expect_activation: false
