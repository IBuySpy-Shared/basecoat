    expect_activation: true
  - id: "neg-1"
    input: "Proofread this paragraph and fix any grammar or punctuation errors."
    expect_activation: false
  - id: "neg-2"
    input: "Rename all variables named `data` to `payload` throughout our codebase."
    expect_activation: false
