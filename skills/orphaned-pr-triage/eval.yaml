name: "orphaned-pr-triage-routing"
description: "Routing evaluation — validates trigger activation for orphaned-pr-triage."
skill: "skills/orphaned-pr-triage/SKILL.md"
scenarios:
  - id: "pos-1"
    input: "Find stale pull requests with no activity in 20 days and classify cleanup actions."
    expect_activation: true
  - id: "pos-2"
    input: "Generate a weekly orphaned PR report with revive, close, and escalate buckets."
    expect_activation: true
  - id: "pos-3"
    input: "Help me reassign ownership for blocked PRs waiting on unavailable reviewers."
    expect_activation: true
  - id: "neg-1"
    input: "Implement token refresh handling in our API."
    expect_activation: false
  - id: "neg-2"
    input: "Design a multi-region disaster recovery architecture."
    expect_activation: false
