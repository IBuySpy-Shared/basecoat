groups:
  - name: basecoat_performance_alerts
    interval: 30s
    rules:
      # API Response Time Alerts
      - alert: APIResponseTimeHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 1000
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API response time (p95) > 1000ms"
          description: "Response time 95th percentile: {{ $value }}ms"

      - alert: APIResponseTimeCritical
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 2000
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API response time (p95) > 2000ms - CRITICAL"
          description: "Response time 95th percentile: {{ $value }}ms"

      # Error Rate Alerts
      - alert: APIErrorRateHigh
        expr: (sum(rate(http_request_failed[5m])) / sum(rate(http_requests_total[5m]))) > 0.01
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API error rate > 1%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      - alert: APIErrorRateCritical
        expr: (sum(rate(http_request_failed[5m])) / sum(rate(http_requests_total[5m]))) > 0.05
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API error rate > 5% - CRITICAL"
          description: "Error rate: {{ $value | humanizePercentage }}"

      # Database Connection Alerts
      - alert: DatabaseConnectionPoolHigh
        expr: pg_stat_activity_count > 100
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connections > 100"
          description: "Active connections: {{ $value }}"

      - alert: DatabaseConnectionPoolCritical
        expr: pg_stat_activity_count > 150
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connections > 150 - CRITICAL"
          description: "Active connections: {{ $value }}"

      # Database CPU Alerts
      - alert: DatabaseCPUHigh
        expr: 'avg(rate(node_cpu_seconds_total{job="postgres", mode!="idle"}[5m])) * 100 > 80'
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database CPU > 80%"
          description: "CPU usage: {{ $value }}%"

      # API Server CPU Alerts
      - alert: APICPUHigh
        expr: 'avg(rate(node_cpu_seconds_total{job="basecoat-api", mode!="idle"}[5m])) * 100 > 80'
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API server CPU > 80%"
          description: "CPU usage: {{ $value }}%"

      # Memory Alerts
      - alert: MemoryUsageHigh
        expr: '(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.15'
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Memory available < 15%"
          description: "Available memory: {{ $value | humanizePercentage }}"

      # Cache Eviction Alerts
      - alert: CacheEvictionsHigh
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 1m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis evictions > 100/sec"
          description: "Eviction rate: {{ $value }}/sec"

      # Query Performance Alerts
      - alert: SlowQueryDetected
        expr: histogram_quantile(0.99, rate(pg_query_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "99th percentile query time > 1 second"
          description: "Query time p99: {{ $value }}s"

      # Throughput Degradation Alerts
      - alert: ThroughputDegraded
        expr: rate(http_requests_total[5m]) < 100
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Throughput < 100 req/sec"
          description: "Current throughput: {{ $value }} req/sec"

      # Cache Hit Rate Alerts
      - alert: CacheHitRateLow
        expr: '(redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)) < 0.5'
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis hit rate < 50%"
          description: "Hit rate: {{ $value | humanizePercentage }}"

      # Infrastructure Up/Down Alerts
      - alert: APIServerDown
        expr: up{job="basecoat-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API server is down"
          description: "API server at {{ $labels.instance }} is unreachable"

      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database is down"
          description: "Database at {{ $labels.instance }} is unreachable"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis at {{ $labels.instance }} is unreachable"
