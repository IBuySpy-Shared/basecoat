site_name: BaseCoat
site_description: Enterprise shared library of GitHub Copilot customization assets — agents, skills, instructions, and prompts.
site_url: https://ibuyspy-shared.github.io/basecoat/
repo_url: https://github.com/IBuySpy-Shared/basecoat
repo_name: IBuySpy-Shared/basecoat
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started.md
    - Enterprise Setup: guides/enterprise-setup.md
    - Consumer Sync Guide: guides/consumer-sync.md
  - Asset Reference:
    - Overview: reference/QUICK_REFERENCE.md
    - Inventory: reference/INVENTORY.md
    - Agents: reference/ASSET_REGISTRY.md
    - Governance: reference/GOVERNANCE.md
  - How-To Guides:
    - Contributing: guides/contributing.md
    - Sync Your Repo: guides/consumer-sync.md
    - Version Drift Detection: guides/version-drift.md
  - Architecture:
    - Overview: architecture/overview.md
    - Naming Convention (ADR-001): architecture/decisions/adr-001-naming-convention.md
    - Multi-Agent Patterns: architecture/multi-agent-orchestration-patterns.md
  - Metrics Dashboard:
    - Adoption Metrics: https://ibuyspy-shared.github.io/basecoat/dashboard/metrics/
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IBuySpy-Shared/basecoat
