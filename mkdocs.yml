site_name: BaseCoat
site_description: Enterprise shared library of GitHub Copilot customization assets — agents, skills, instructions, and prompts.
# URLs below are substituted automatically by .github/workflows/docs.yml for consumer forks.
site_url: https://ibuyspy-shared.github.io/basecoat/
repo_url: https://github.com/IBuySpy-Shared/basecoat
repo_name: IBuySpy-Shared/basecoat
edit_uri: edit/main/docs/

# Exclude legacy archive files — links are historical and not maintained
exclude_docs: |
  archive/**

theme:
  name: material
  logo: material/layers
  favicon: material/layers
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - awesome-pages

exclude_docs: archive/**

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started.md
    - Enterprise Setup: guides/enterprise-setup.md
    - Consumer Sync Guide: guides/consumer-sync.md
  - Asset Reference:
    - Overview: reference/QUICK_REFERENCE.md
    - Inventory: reference/INVENTORY.md
    - Agents: reference/ASSET_REGISTRY.md
    - Governance: reference/GOVERNANCE.md
  - How-To Guides:
    - Intent Prefixes: guides/intent-prefixes.md
    - Get Started (integrate prompt): guides/integrate-prompt.md
    - Make It Your Own: guides/customization.md
    - Agent Examples: guides/agent-examples.md
    - A/B Experimentation: guides/ab-experimentation.md
    - Contributing: guides/contributing.md
    - Version Drift Detection: guides/version-drift.md
    - Model Optimization: guides/MODEL_OPTIMIZATION.md
    - Token Optimization: guides/token-optimization.md
  - Memory System:
    - Overview: memory/index.md
    - Learning Model: memory/LEARNING_MODEL.md
    - Triage Guide: memory/triage.md
    - Contributing Learnings: memory/CONTRIBUTING.md
    - Process: memory/PROCESS.md
  - Architecture:
    - Overview: architecture/overview.md
    - Diagrams: diagrams/README.md
    - ADR-001 Naming Convention: architecture/decisions/adr-001-naming-convention.md
    - Multi-Agent Patterns: architecture/multi-agent-orchestration-patterns.md
  - About:
    - Philosophy: PHILOSOPHY.md
    - The Story: story.md
    - Metrics: metrics.md
    - Changelog: changelog.md

copyright: 'Copyright &copy; IBuySpy-Shared contributors. Licensed under MIT.'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IBuySpy-Shared/basecoat
