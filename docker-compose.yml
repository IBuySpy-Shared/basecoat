version: '3.8'

# Copy .env.example to .env before running docker compose up.
# The required variables below intentionally fail fast if they are missing.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: basecoat
      POSTGRES_USER: basecoat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basecoat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./portal/backend
    environment:
      DATABASE_URL: postgres://basecoat:${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}@postgres:5432/basecoat
      JWT_SECRET: ${JWT_SECRET:?Copy .env.example to .env and set JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?Copy .env.example to .env and set GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?Copy .env.example to .env and set GITHUB_CLIENT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./portal/frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
