version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: basecoat
      POSTGRES_USER: basecoat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basecoat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./portal/backend
    environment:
      DATABASE_URL: postgres://basecoat:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/basecoat
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./portal/frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
