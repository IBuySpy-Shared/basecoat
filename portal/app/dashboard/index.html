<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Coat — Adoption Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; padding: 2rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #8b949e; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; }
        .card h2 { font-size: 1rem; color: #8b949e; margin-bottom: 0.5rem; }
        .card .value { font-size: 2.5rem; font-weight: bold; color: #58a6ff; }
        .card .delta { font-size: 0.85rem; margin-top: 0.25rem; }
        .delta.positive { color: #3fb950; }
        .delta.negative { color: #f85149; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .chart-container h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: #8b949e; font-weight: 500; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }
        .badge-green { background: #1b4332; color: #3fb950; }
        .badge-yellow { background: #3d2e00; color: #d29922; }
        .badge-red { background: #3d1418; color: #f85149; }
        .loading { text-align: center; padding: 4rem; color: #8b949e; }
        .error { color: #f85149; padding: 2rem; text-align: center; }
        footer { margin-top: 2rem; color: #484f58; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <h1>🧥 Base Coat — Adoption Dashboard</h1>
    <p class="subtitle">Measuring Copilot customization effectiveness across dogfooding projects</p>

    <div id="app">
        <div class="loading">Loading metrics...</div>
    </div>

    <footer>
        Data collected weekly by GitHub Actions. No secrets stored client-side.<br>
        Bootstrap setup: <code>pwsh scripts/bootstrap-dashboard.ps1</code>
    </footer>

    <script>
    async function loadMetrics() {
        const app = document.getElementById('app');
        try {
            const [latest, history] = await Promise.all([
                fetch('metrics/latest.json').then(r => r.ok ? r.json() : null),
                fetch('metrics/history.json').then(r => r.ok ? r.json() : null)
            ]);

            if (!latest) {
                app.innerHTML = `
                    <div class="error">
                        <h2>No metrics data yet</h2>
                        <p>Run the bootstrap script and trigger the workflow:</p>
                        <pre>pwsh scripts/bootstrap-dashboard.ps1
gh workflow run adoption-metrics.yml</pre>
                    </div>`;
                return;
            }

            renderDashboard(latest, history || []);
        } catch (e) {
            app.innerHTML = `<div class="error">Failed to load metrics: ${e.message}</div>`;
        }
    }

    function renderDashboard(latest, history) {
        const app = document.getElementById('app');
        const repos = Object.entries(latest.repos);
        const copilot = latest.copilot;

        // Summary cards
        const totalPRs = repos.reduce((s, [, d]) => s + d.pull_requests.prs_merged_28d, 0);
        const avgCI = repos.length > 0
            ? (repos.reduce((s, [, d]) => s + d.ci.success_rate, 0) / repos.length).toFixed(1)
            : 0;
        const avgCoverage = repos.length > 0
            ? (repos.reduce((s, [, d]) => s + d.basecoat_coverage.percentage, 0) / repos.length).toFixed(1)
            : 0;

        let html = `
        <div class="grid">
            <div class="card">
                <h2>Copilot Active Users</h2>
                <div class="value">${copilot.available ? (copilot.total_active_users || '—') : '—'}</div>
                <div class="delta">${copilot.available ? 'org-wide' : 'API not configured'}</div>
            </div>
            <div class="card">
                <h2>PRs Merged (28d)</h2>
                <div class="value">${totalPRs}</div>
                <div class="delta">across ${repos.length} repos</div>
            </div>
            <div class="card">
                <h2>CI Success Rate</h2>
                <div class="value">${avgCI}%</div>
                <div class="delta ${avgCI >= 90 ? 'positive' : avgCI >= 75 ? '' : 'negative'}">average</div>
            </div>
            <div class="card">
                <h2>Base Coat Coverage</h2>
                <div class="value">${avgCoverage}%</div>
                <div class="delta">assets synced</div>
            </div>
        </div>`;

        // Repo table
        html += `
        <div class="chart-container">
            <h2>Repository Breakdown</h2>
            <table>
                <thead>
                    <tr><th>Repository</th><th>PRs</th><th>Cycle Time</th><th>CI</th><th>Issues Closed</th><th>Coverage</th></tr>
                </thead>
                <tbody>`;

        for (const [repo, data] of repos) {
            const short = repo.split('/').pop();
            const ci = data.ci.success_rate;
            const ciBadge = ci >= 90 ? 'badge-green' : ci >= 75 ? 'badge-yellow' : 'badge-red';
            html += `
                <tr>
                    <td><strong>${short}</strong></td>
                    <td>${data.pull_requests.prs_merged_28d}</td>
                    <td>${data.pull_requests.cycle_time_median_hours}h</td>
                    <td><span class="badge ${ciBadge}">${ci}%</span></td>
                    <td>${data.issues.issues_closed_28d}</td>
                    <td>${data.basecoat_coverage.percentage}%</td>
                </tr>`;
        }

        html += `</tbody></table></div>`;

        // Trend chart (if history available)
        if (history.length > 1) {
            html += `
            <div class="chart-container">
                <h2>Trends (Weekly)</h2>
                <canvas id="trendChart" height="100"></canvas>
            </div>`;
        }

        app.innerHTML = html;

        // Render chart
        if (history.length > 1) {
            const labels = history.map(h => h.collected_at.slice(0, 10));
            const ciData = history.map(h => {
                const r = Object.values(h.repos);
                return r.length > 0 ? (r.reduce((s, d) => s + d.ci.success_rate, 0) / r.length).toFixed(1) : 0;
            });
            const prData = history.map(h => {
                return Object.values(h.repos).reduce((s, d) => s + d.pull_requests.prs_merged_28d, 0);
            });

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'CI Success %', data: ciData, borderColor: '#3fb950', tension: 0.3, yAxisID: 'y' },
                        { label: 'PRs Merged', data: prData, borderColor: '#58a6ff', tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#8b949e' } } },
                    scales: {
                        x: { ticks: { color: '#484f58' }, grid: { color: '#21262d' } },
                        y: { position: 'left', ticks: { color: '#3fb950' }, grid: { color: '#21262d' }, min: 0, max: 100 },
                        y1: { position: 'right', ticks: { color: '#58a6ff' }, grid: { display: false }, min: 0 }
                    }
                }
            });
        }
    }

    loadMetrics();
    </script>
</body>
</html>
