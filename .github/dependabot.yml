version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "copilot"
    commit-message:
      prefix: "chore(deps)"
    # We pin actions to commit SHAs for security.
    # Dependabot detects version tag updates but PRs need manual
    # SHA verification before merging.
    open-pull-requests-limit: 5
