name: Submit Learning to Basecoat Memory

# Starter workflow — appears in Actions > New workflow for IBuySpy-Shared repos.
# Calls the reusable submit-learning-callable.yml in IBuySpy-Shared/basecoat.
#
# Prerequisites (one-time admin setup):
#   MEMORY_REPO_TOKEN set as an org-level Actions secret in IBuySpy-Shared.
#   See: https://github.com/IBuySpy-Shared/basecoat/blob/main/docs/memory/SETUP-INTERNAL.md

on:
  workflow_dispatch:
    inputs:
      subject:
        description: "Subject (domain:key — e.g., ci:agent-pr-approval)"
        required: true
        type: string
      fact:
        description: "Pattern or fact (≤ 300 chars, no project-specific names)"
        required: true
        type: string
      evidence:
        description: "Evidence URL (PR, issue, or CHANGELOG)"
        required: true
        type: string
      domain:
        description: "Domain"
        required: true
        type: choice
        options:
          - ci
          - git
          - authoring
          - process
          - security
          - portal
          - testing
          - governance
          - memory
          - infra
      team:
        description: "Team name (optional)"
        required: false
        type: string
        default: ""

jobs:
  submit:
    uses: IBuySpy-Shared/basecoat/.github/workflows/submit-learning-callable.yml@main
    with:
      subject:  ${{ inputs.subject }}
      fact:     ${{ inputs.fact }}
      evidence: ${{ inputs.evidence }}
      domain:   ${{ inputs.domain }}
      source:   ${{ github.repository }}
      team:     ${{ inputs.team }}
      open_pr:  true
    secrets:
      memory_repo_token: ${{ secrets.MEMORY_REPO_TOKEN }}
