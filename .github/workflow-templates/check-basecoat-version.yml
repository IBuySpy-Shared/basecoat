name: Check BaseCoat Version

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    uses: IBuySpy-Shared/basecoat/.github/workflows/check-basecoat-version-callable.yml@main
    with:
      stage_path: .github/base-coat
      alert_threshold: 1
    permissions:
      issues: write
      contents: read
