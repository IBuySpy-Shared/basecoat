name: Process Memory Contribution Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write     # comment + close
  contents: read    # read this repo's scripts

jobs:
  process:
    name: Validate and queue contribution
    runs-on: ubuntu-latest
    # Only run when the memory-contribution label is added
    if: github.event.label.name == 'memory-contribution'
    timeout-minutes: 10

    steps:
      - name: Check out basecoat scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 1
          path: basecoat

      - name: Parse issue body
        id: parse
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function extract(label) {
              // GitHub issue form fields render as: "### Label\n\nvalue\n"
              const re = new RegExp(`###\\s*${label}[\\s\\S]*?\\n\\n([^\\n#]+)`, 'i');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const subject  = extract('Subject \\(domain:key\\)');
            const domain   = extract('Domain');
            const fact     = extract('Pattern / Fact');
            const evidence = extract('Evidence URL');
            const source   = extract('Source repo \\(org/repo\\)');
            const team     = extract('Team \\(optional\\)');

            core.setOutput('subject',  subject);
            core.setOutput('domain',   domain);
            core.setOutput('fact',     fact);
            core.setOutput('evidence', evidence);
            core.setOutput('source',   source);
            core.setOutput('team',     team);

            // Basic validation
            const errors = [];
            if (!subject.match(/^[a-z]+:[a-z][a-z0-9-]+$/))
              errors.push(`Subject '${subject}' must match domain:key format`);
            if (subject && domain && !subject.startsWith(domain + ':'))
              errors.push(`Subject domain '${subject.split(':')[0]}' does not match domain '${domain}'`);
            if (fact.length > 300)
              errors.push(`Fact is ${fact.length} chars; must be ≤ 300`);
            if (!evidence.match(/^https?:\/\//))
              errors.push(`Evidence must be a URL`);
            if (!source)
              errors.push(`Source repo is required`);

            const projectSpecific = /TypeORM|Jest|Winston|Supertest|NextAuth|Prisma|Sequelize/i;
            if (projectSpecific.test(fact)) {
              const m = fact.match(projectSpecific);
              errors.push(`Fact contains '${m[0]}' — possible project-specific technology`);
            }

            core.setOutput('valid', errors.length === 0 ? 'true' : 'false');
            core.setOutput('errors', errors.join('\n'));

      - name: Comment — validation failure
        if: steps.parse.outputs.valid != 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Memory Contribution — Validation Failed

            Thank you for your submission! A few issues need to be resolved before this can be queued for steward review:

            \`\`\`
            ${{ steps.parse.outputs.errors }}
            \`\`\`

            Please edit the issue body to fix the above, then re-apply the \`memory-contribution\` label.

            **Scope policy reminder:**
            - Generic — no product names, internal tooling, org-specific references
            - Applicable broadly — not just your specific project
            - Durable — holds true across ≥ 3 sprints or ≥ 2 incidents
            - Actionable — another team would change behavior based on this`
            });

      - name: Push candidate to basecoat-memory
        id: push
        if: steps.parse.outputs.valid == 'true' && env.MEMORY_REPO_TOKEN != ''
        env:
          MEMORY_REPO_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
          SUBJECT:  ${{ steps.parse.outputs.subject }}
          FACT:     ${{ steps.parse.outputs.fact }}
          EVIDENCE: ${{ steps.parse.outputs.evidence }}
          DOMAIN:   ${{ steps.parse.outputs.domain }}
          SOURCE:   ${{ steps.parse.outputs.source }}
          TEAM:     ${{ steps.parse.outputs.team }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          bash basecoat/scripts/submit-learning.sh \
            --subject  "$SUBJECT" \
            --fact     "$FACT" \
            --evidence "$EVIDENCE" \
            --domain   "$DOMAIN" \
            --source   "$SOURCE" \
            $([ -n "$TEAM" ] && echo "--team '$TEAM'" || true) \
            --open-pr

      - name: Comment — success
        if: steps.parse.outputs.valid == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const queued = '${{ env.MEMORY_REPO_TOKEN }}' !== '';
            const msg = queued
              ? `## ✅ Memory Contribution — Queued for Review

            Your learning has been written to \`basecoat-memory/sweep-candidates/\` and a PR has been opened for the steward team.

            | | |
            |---|---|
            | **Subject** | \`${{ steps.parse.outputs.subject }}\` |
            | **Domain** | \`${{ steps.parse.outputs.domain }}\` |
            | **Source** | \`${{ steps.parse.outputs.source }}\` |

            The steward team will review, generalize if needed, and promote it to \`memories/${{ steps.parse.outputs.domain }}/\`. Once merged, your pattern will flow to all \`basecoat-enabled\` repos via the weekly hot-index sync.

            This issue will be closed automatically once the candidate is promoted.`
              : `## ✅ Memory Contribution — Validated

            Your submission passed scope validation and has been logged for the next weekly sweep.

            A steward will review and promote it to \`basecoat-memory\` if it passes the full review.

            | | |
            |---|---|
            | **Subject** | \`${{ steps.parse.outputs.subject }}\` |
            | **Domain** | \`${{ steps.parse.outputs.domain }}\` |`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
