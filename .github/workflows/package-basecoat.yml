name: Package Base Coat

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/validate-basecoat.yml

  package:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Package release artifacts
        run: bash scripts/package-basecoat.sh

      - name: Create GHCP ZIP
        run: |
          zip -r dist/basecoat-ghcp.zip \
            agents/ \
            skills/ \
            instructions/ \
            prompts/ \
            basecoat-metadata.json \
            CATALOG.md

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: base-coat-release
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: base-coat-release
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload only files (not the stage directory left by the packaging script)
          files=$(find dist -maxdepth 1 -type f)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" $files --clobber --repo "${{ github.repository }}"
          else
            gh release create "$GITHUB_REF_NAME" $files --title "Base Coat $GITHUB_REF_NAME" --generate-notes --repo "${{ github.repository }}"
          fi
