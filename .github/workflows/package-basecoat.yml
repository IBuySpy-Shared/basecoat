name: Package Base Coat

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validate-basecoat.yml
    with:
      concurrency_group: "Package-Base-Coat-validate-${{ github.ref }}"

  package:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Package release artifacts
        run: bash scripts/package-basecoat.sh

      - name: Create GHCP ZIP
        run: |
          rm -rf dist/ghcp-stage
          mkdir -p dist/ghcp-stage
          cp -R agents skills instructions prompts dist/ghcp-stage/
          cp basecoat-metadata.json CATALOG.md dist/ghcp-stage/
          find dist/ghcp-stage/skills -type f -name 'eval.yaml' -delete
          find dist/ghcp-stage/agents -type f -name '*.agent.eval.yaml' -delete
          (cd dist/ghcp-stage && zip -r ../basecoat-ghcp.zip .)

      - name: Verify no eval metadata in install artifacts
        run: |
          set -euo pipefail
          echo "Checking staged install payloads for eval metadata..."
          found=0
          # Check main stage
          if find dist/stage -type f \( -name 'eval.yaml' -o -name '*.agent.eval.yaml' \) 2>/dev/null | grep -q .; then
            echo "::error::eval metadata found in dist/stage — packaging must exclude eval files"
            find dist/stage -type f \( -name 'eval.yaml' -o -name '*.agent.eval.yaml' \)
            found=1
          fi
          # Check GHCP stage
          if find dist/ghcp-stage -type f \( -name 'eval.yaml' -o -name '*.agent.eval.yaml' \) 2>/dev/null | grep -q .; then
            echo "::error::eval metadata found in dist/ghcp-stage — packaging must exclude eval files"
            find dist/ghcp-stage -type f \( -name 'eval.yaml' -o -name '*.agent.eval.yaml' \)
            found=1
          fi
          if [[ $found -eq 0 ]]; then
            echo "✅ No eval metadata found in install artifacts"
          fi
          exit $found

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: base-coat-release
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: base-coat-release
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload only files (not the stage directory left by the packaging script)
          files=$(find dist -maxdepth 1 -type f)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" $files --clobber --repo "${{ github.repository }}"
          else
            gh release create "$GITHUB_REF_NAME" $files --title "Base Coat $GITHUB_REF_NAME" --generate-notes --repo "${{ github.repository }}"
          fi
