name: Memory Audit

on:
  schedule:
    # Quarterly: 1st day of Jan, Apr, Jul, Oct at 07:00 UTC
    - cron: "0 7 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      stale_after_days:
        description: "Days without validation before a memory is stale"
        required: false
        default: "180"
        type: string
      open_pr:
        description: "Open a deprecation PR in basecoat-memory for stale memories"
        required: false
        default: false
        type: boolean
      mode:
        description: "audit (report stale) or validate (check all memory files)"
        required: false
        default: "audit"
        type: choice
        options:
          - audit
          - validate

# No write permissions on this repo — all writes go to {org}/basecoat-memory
permissions:
  contents: read

# Token strategy (same as memory-sweep.yml):
#   GITHUB_TOKEN       — read this repo (scripts)
#   MEMORY_REPO_TOKEN  — fine-grained PAT scoped to {org}/basecoat-memory
#                        Required permissions on basecoat-memory:
#                          Contents: Read and Write
#                          Pull requests: Read and Write
#                          Metadata: Read (implicit)

jobs:
  audit:
    name: Audit shared memory repo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out basecoat (scripts only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 1

      - name: Validate memory files
        if: inputs.mode == 'validate' || github.event_name == 'schedule'
        shell: pwsh
        env:
          BASECOAT_SHARED_MEMORY_REPO: ${{ github.repository_owner }}/basecoat-memory
          GH_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
        run: |
          pwsh scripts/audit-memories.ps1 -Validate

      - name: Audit for stale memories
        if: inputs.mode != 'validate'
        shell: pwsh
        env:
          BASECOAT_SHARED_MEMORY_REPO: ${{ github.repository_owner }}/basecoat-memory
          MEMORY_REPO_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
        run: |
          $openPr = [bool]::Parse("${{ inputs.open_pr || 'false' }}")
          $days   = [int]"${{ inputs.stale_after_days || '180' }}"
          $args   = @("-Audit", "-StaleAfterDays", $days)
          if ($openPr) { $args += "-OpenPR" }
          pwsh scripts/audit-memories.ps1 @args

      - name: Summary
        if: always()
        run: |
          echo "## Memory Audit Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ inputs.mode || 'audit + validate (scheduled)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stale threshold | ${{ inputs.stale_after_days || '180' }} days |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Open PR | ${{ inputs.open_pr || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | \`${{ github.repository_owner }}/basecoat-memory\` |" >> "$GITHUB_STEP_SUMMARY"
