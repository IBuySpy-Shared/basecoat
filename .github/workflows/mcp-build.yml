name: MCP Build

on:
  push:
    paths:
      - "mcp/basecoat-metrics/**"
      - "infra/mcp/**"
      - ".github/workflows/mcp-build.yml"
  pull_request:
    paths:
      - "mcp/basecoat-metrics/**"
      - "infra/mcp/**"
      - ".github/workflows/mcp-build.yml"

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build, lint, and validate MCP server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp/basecoat-metrics/package-lock.json

      - name: Install dependencies
        working-directory: mcp/basecoat-metrics
        run: npm ci

      - name: TypeScript build
        working-directory: mcp/basecoat-metrics
        run: npm run build

      - name: Docker build smoke test
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: mcp/basecoat-metrics
          push: false
          tags: basecoat-metrics-mcp:pr-${{ github.event.number || 'local' }}

      - name: Lint Bicep template
        run: az bicep build --file infra/mcp/main.bicep --stdout > /dev/null
