name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint — YAML frontmatter in .agent.md files
        run: |
          status=0
          while IFS= read -r file; do
            if [[ "$(sed -n '1p' "$file")" != "---" ]]; then
              echo "::error file=$file::Missing YAML frontmatter opening '---'"
              status=1
              continue
            fi
            # Find closing --- within first 30 lines
            if ! sed -n '2,30p' "$file" | grep -qxF -- '---'; then
              echo "::error file=$file::Missing YAML frontmatter closing '---' within first 30 lines"
              status=1
              continue
            fi
            if ! sed -n '1,30p' "$file" | grep -qi '^description:'; then
              echo "::error file=$file::Missing 'description' in YAML frontmatter"
              status=1
            fi
          done < <(find agents -type f -name '*.agent.md' | sort)
          exit $status

      - name: Lint — every skill directory has SKILL.md
        run: |
          status=0
          for dir in skills/*/; do
            if [[ ! -f "${dir}SKILL.md" ]]; then
              echo "::error::Skill directory '${dir}' is missing SKILL.md"
              status=1
            fi
          done
          exit $status

      - name: Lint — instruction files follow naming convention
        run: |
          status=0
          while IFS= read -r file; do
            base="$(basename "$file")"
            if [[ "$base" == "README.md" ]]; then
              continue
            fi
            if [[ ! "$base" =~ ^[a-z][a-z0-9-]*\.instructions\.md$ ]]; then
              echo "::error file=$file::File does not follow naming convention '<name>.instructions.md'"
              status=1
            fi
          done < <(find instructions -type f -name '*.md' | sort)
          exit $status

      - name: Validate — CATALOG.md references exist on disk
        run: |
          status=0

          # Extract all backtick-quoted file/dir paths from CATALOG.md
          refs=$(grep -oP '`(agents|skills|instructions|prompts|docs)/[^`]+`' CATALOG.md | tr -d '`' | sort -u)

          for ref in $refs; do
            # Skill directory references end with /
            if [[ "$ref" == */ ]]; then
              dir="${ref%/}"
              if [[ ! -d "$dir" ]]; then
                echo "::error file=CATALOG.md::Referenced directory '$ref' does not exist on disk"
                status=1
              fi
            else
              if [[ ! -f "$ref" ]]; then
                echo "::error file=CATALOG.md::Referenced file '$ref' does not exist on disk"
                status=1
              fi
            fi
          done

          exit $status
