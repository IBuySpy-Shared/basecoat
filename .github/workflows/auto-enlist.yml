name: Auto-Enlist Repos in Basecoat

# Admin workflow: bulk-enlist one or more org repos in the basecoat memory sweep.
# Adds the basecoat-enabled topic and creates learning labels in each repo.
# Internal repos only — requires admin or write access to the target repos.

on:
  workflow_dispatch:
    inputs:
      repos:
        description: >
          Comma-separated list of repos to enlist (e.g., IBuySpy-Shared/repo1,IBuySpy-Shared/repo2).
          Leave blank to enlist ALL repos in the org (use with care).
        required: false
        type: string
        default: ""
      org:
        description: "GitHub org to sweep when repos is blank (default: IBuySpy-Shared)"
        required: false
        type: string
        default: "IBuySpy-Shared"
      dry_run:
        description: "Dry run — print actions without making changes"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  enlist:
    name: Enlist repos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out basecoat scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1

      - name: Build repo list
        id: repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REPOS: ${{ inputs.repos }}
          INPUT_ORG:   ${{ inputs.org }}
        run: |
          if [[ -n "$INPUT_REPOS" ]]; then
            # Use provided list
            REPO_LIST=$(echo "$INPUT_REPOS" | tr ',' '\n' | tr -d ' ')
          else
            # Discover all non-archived repos in the org
            echo "🔍 Discovering all repos in org: $INPUT_ORG"
            REPO_LIST=$(gh api "orgs/$INPUT_ORG/repos?per_page=100&type=all" \
              --paginate \
              --jq '.[] | select(.archived == false) | .full_name')
          fi
          COUNT=$(echo "$REPO_LIST" | grep -c . || echo 0)
          echo "Found $COUNT repos"
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPO_LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Enlist each repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          REPOS="${{ steps.repos.outputs.list }}"
          COUNT="${{ steps.repos.outputs.count }}"
          echo "🚀 Enlisting $COUNT repos (dry_run=$DRY_RUN)"
          echo ""

          DRY_FLAG=""
          [[ "$DRY_RUN" == "true" ]] && DRY_FLAG="--dry-run"

          SUCCEEDED=0
          FAILED=0
          SKIPPED=0

          while IFS= read -r repo; do
            [[ -z "$repo" ]] && continue
            echo "──────────────────────────────────────────"
            echo "📦 $repo"
            if bash scripts/onboard-basecoat.sh --repo "$repo" $DRY_FLAG; then
              (( SUCCEEDED++ )) || true
            else
              echo "⚠️  Failed to enlist $repo — skipping"
              (( FAILED++ )) || true
            fi
          done <<< "$REPOS"

          echo ""
          echo "══════════════════════════════════════════"
          echo "✅ Succeeded: $SUCCEEDED"
          [[ $FAILED -gt 0 ]] && echo "❌ Failed:    $FAILED"
          echo ""
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "ℹ️  This was a dry run. Re-run with dry_run=false to apply changes."
          fi
