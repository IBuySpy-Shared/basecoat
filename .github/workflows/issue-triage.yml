name: Issue Triage Agent

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Classify and label issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labels = [];

            // Classify by asset type
            if (title.includes('agent') || body.includes('agent')) labels.push('agent');
            if (title.includes('skill') || body.includes('skill')) labels.push('skill');
            if (title.includes('instruction') || body.includes('instruction')) labels.push('instruction');
            if (title.includes('prompt') || body.includes('prompt template')) labels.push('prompt');
            if (title.includes('doc') || title.includes('guide')) labels.push('documentation');

            // Classify by domain
            if (title.includes('azure') || body.includes('azure')) labels.push('azure');
            if (title.includes('security') || body.includes('security')) labels.push('security');
            if (title.includes('testing') || body.includes('test')) labels.push('testing');
            if (title.includes('migration') || body.includes('moderniz')) labels.push('modernization');

            // Priority heuristic
            if (body.includes('blocking') || body.includes('urgent')) {
              labels.push('priority:high');
            }

            // Always add triage label
            if (!issue.labels || issue.labels.length === 0) {
              labels.push('triage');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

            return labels;

      - name: Generate implementation plan
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';

            // Determine asset type and target path
            let assetType = 'unknown';
            let targetPath = '';
            let template = '';

            if (title.toLowerCase().includes('agent')) {
              assetType = 'agent';
              const name = title.replace(/.*(?:add|create|feat:?\s*add)\s*/i, '')
                .replace(/\s*agent.*$/i, '').trim()
                .toLowerCase().replace(/\s+/g, '-');
              targetPath = `agents/${name}.agent.md`;
              template = [
                '1. Create `' + targetPath + '` with YAML frontmatter (name, description, tools)',
                '2. Add required sections: `## Inputs`, `## Workflow`, `## Output Format`',
                '3. Ensure MD lint passes (no bold-as-heading, code fences have language)',
                '4. Run `pwsh tests/agent-integration-tests.ps1` to validate structure',
              ].join('\n');
            } else if (title.toLowerCase().includes('skill')) {
              assetType = 'skill';
              const name = title.replace(/.*(?:add|create|feat:?\s*add)\s*/i, '')
                .replace(/\s*skill.*$/i, '').trim()
                .toLowerCase().replace(/\s+/g, '-');
              targetPath = `skills/${name}/SKILL.md`;
              template = [
                '1. Create `skills/' + name + '/` directory with `SKILL.md`',
                '2. Add YAML frontmatter (name, description, triggers)',
                '3. Document usage examples and expected outputs',
                '4. Ensure MD lint passes',
              ].join('\n');
            } else if (title.toLowerCase().includes('instruction')) {
              assetType = 'instruction';
              const name = title.replace(/.*(?:add|create|feat:?\s*add)\s*/i, '')
                .replace(/\s*instruction.*$/i, '').trim()
                .toLowerCase().replace(/\s+/g, '-');
              targetPath = `instructions/${name}.instructions.md`;
              template = [
                '1. Create `' + targetPath + '` with frontmatter (description, applyTo)',
                '2. Write clear behavioral directives',
                '3. Include examples and anti-patterns',
                '4. Ensure MD lint passes',
              ].join('\n');
            } else {
              template = [
                '1. Analyze issue requirements',
                '2. Determine correct asset type and location',
                '3. Implement following repo conventions (see .github/copilot-instructions.md)',
                '4. Validate with CI checks',
              ].join('\n');
            }

            const plan = [
              '## 🤖 Triage Plan',
              '',
              `**Asset type:** ${assetType}`,
              targetPath ? `**Target:** \`${targetPath}\`` : '',
              '',
              '### Implementation Steps',
              '',
              template,
              '',
              '### Conventions',
              '',
              '- Branch: `feat/<issue-number>-<short-name>`',
              '- Commit: `feat(<scope>): <summary>`',
              '- PR body must include `PRD:` and `Spec:` links',
              '',
              '---',
              '',
              '**To approve this plan and assign to Copilot agent:**',
              '```',
              '/approve',
              '```',
              '',
              '**To modify:** Edit this issue description or comment with changes, then `/approve`.',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: plan
            });
