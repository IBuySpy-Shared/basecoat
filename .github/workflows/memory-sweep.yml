name: Enterprise Memory Sweep

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub org to sweep (default: repo owner)"
        required: false
        type: string
      days_back:
        description: "How many days back to look for signals"
        required: false
        default: "30"
        type: string

# No write permissions needed on this repo — all writes go to {org}/basecoat-memory
permissions:
  contents: read

# Token strategy (two tokens, different scopes):
#   GITHUB_TOKEN        — reads this repo + searches/reads all enlisted org repos
#   MEMORY_REPO_TOKEN   — fine-grained PAT scoped to {org}/basecoat-memory only
#                         Required permissions on basecoat-memory:
#                           Contents: Read and Write  (clone + push branch)
#                           Pull requests: Read and Write  (gh pr create)
#                           Metadata: Read (implicit)

jobs:
  sweep:
    name: Sweep enlisted repos for learnings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level GH_TOKEN — each step uses the correct token explicitly

    steps:
      - name: Check out basecoat (scripts only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1
          path: basecoat

      - name: Set sweep parameters
        id: params
        run: |
          ORG="${{ inputs.org || github.repository_owner }}"
          DAYS="${{ inputs.days_back || '30' }}"
          DATE="$(date -u +%Y-%m-%d)"
          MEMORY_REPO="${ORG}/basecoat-memory"
          BRANCH="memory-sweep/${DATE}"
          echo "org=${ORG}"               >> "$GITHUB_OUTPUT"
          echo "days=${DAYS}"             >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"             >> "$GITHUB_OUTPUT"
          echo "memory_repo=${MEMORY_REPO}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"         >> "$GITHUB_OUTPUT"

      - name: Check for enlisted repos
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # org-level search — use GITHUB_TOKEN
          ORG: ${{ steps.params.outputs.org }}
        run: |
          COUNT=$(gh api "search/repositories?q=topic:basecoat-enabled+org:${ORG}&per_page=1" \
            --jq '.total_count' 2>/dev/null || echo "0")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "${COUNT}" == "0" ]]; then
            echo "::warning::No repos found with topic 'basecoat-enabled' in org '${ORG}'."
            echo "::warning::Enlist repos: add 'basecoat-enabled' topic. See docs/memory/enlistment.md"
          fi

      - name: Check out basecoat-memory (destination)
        if: steps.check.outputs.count != '0'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: ${{ steps.params.outputs.memory_repo }}
          token: ${{ secrets.MEMORY_REPO_TOKEN }}
          path: basecoat-memory
          fetch-depth: 1

      - name: Run memory sweep → write to basecoat-memory
        if: steps.check.outputs.count != '0'
        shell: pwsh
        env:
          # GITHUB_TOKEN reads PRs/issues/CHANGELOGs from all enlisted repos.
          # MEMORY_REPO_TOKEN is scoped only to basecoat-memory and would 403 here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write candidates directly into the basecoat-memory checkout
          pwsh basecoat/scripts/sweep-enterprise-memory.ps1 `
            -Org "${{ steps.params.outputs.org }}" `
            -DaysBack ${{ steps.params.outputs.days }} `
            -OutputDir "basecoat-memory/sweep-candidates"

      - name: Check for new candidates
        if: steps.check.outputs.count != '0'
        id: candidates
        run: |
          FILE="basecoat-memory/sweep-candidates/${{ steps.params.outputs.date }}.md"
          if [[ -f "${FILE}" ]]; then
            COUNT=$(grep -c "^### \[" "${FILE}" || echo "0")
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "found=true"     >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push candidates to basecoat-memory
        if: steps.candidates.outputs.found == 'true' && steps.candidates.outputs.count != '0'
        env:
          BRANCH: ${{ steps.params.outputs.branch }}
          DATE:   ${{ steps.params.outputs.date }}
          ORG:    ${{ steps.params.outputs.org }}
          DAYS:   ${{ steps.params.outputs.days }}
          COUNT:  ${{ steps.candidates.outputs.count }}
        run: |
          cd basecoat-memory
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add sweep-candidates/
          git commit -m "chore(sweep): candidates ${DATE} (${COUNT} from ${ORG})

Auto-generated by IBuySpy-Shared/basecoat memory-sweep.yml.
Org swept: ${ORG} | Days back: ${DAYS} | Candidates: ${COUNT}

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "${BRANCH}"

      - name: Open PR in basecoat-memory for review
        if: steps.candidates.outputs.found == 'true' && steps.candidates.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
          DATE:         ${{ steps.params.outputs.date }}
          ORG:          ${{ steps.params.outputs.org }}
          COUNT:        ${{ steps.candidates.outputs.count }}
          DAYS:         ${{ steps.params.outputs.days }}
          BRANCH:       ${{ steps.params.outputs.branch }}
          MEMORY_REPO:  ${{ steps.params.outputs.memory_repo }}
        run: |
          gh pr create \
            --repo "${MEMORY_REPO}" \
            --title "chore(sweep): candidates ${DATE} (${COUNT} candidates)" \
            --base main \
            --head "${BRANCH}" \
            --label "memory-sweep" \
            --body "## Memory Sweep — ${DATE}

Auto-generated by the weekly enterprise memory sweep ([source workflow](https://github.com/IBuySpy-Shared/basecoat/actions/workflows/memory-sweep.yml)).

| | |
|---|---|
| **Org swept** | \`${ORG}\` |
| **Days back** | ${DAYS} |
| **Candidates** | ${COUNT} |
| **File** | \`sweep-candidates/${DATE}.md\` |

## Review Instructions

For each candidate in \`sweep-candidates/${DATE}.md\`:

1. **Evaluate** — is it generic enough for all teams? Not project-specific?
2. **Draft** — fill in the memory (≤200 chars) and \`domain:subject\` namespace
3. **Promote** — move the drafted memory to \`memories/{domain}/{subject}.md\`
4. **Delete** the raw candidate entry once promoted (or if low-value)

Merge this PR after review. Unreviewed candidates that aren't promoted should be deleted — they're preserved in git history.

---

*Reviewed by: memory-curator agent or a memory steward*"

      - name: Report no-op
        if: steps.check.outputs.count == '0' || steps.candidates.outputs.found == 'false' || steps.candidates.outputs.count == '0'
        run: |
          echo "✅ Memory sweep complete — no new candidates in the last ${{ steps.params.outputs.days }} days."
          echo "   Enlisted repos: ${{ steps.check.outputs.count }}"
