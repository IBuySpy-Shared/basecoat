name: Enterprise Memory Sweep

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub org to sweep (default: repo owner)"
        required: false
        type: string
      days_back:
        description: "How many days back to look for signals"
        required: false
        default: "30"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep:
    name: Sweep enlisted repos for learnings
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1

      - name: Set sweep parameters
        id: params
        run: |
          ORG="${{ inputs.org || github.repository_owner }}"
          DAYS="${{ inputs.days_back || '30' }}"
          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="memory-sweep/${DATE}"
          echo "org=${ORG}"   >> "$GITHUB_OUTPUT"
          echo "days=${DAYS}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Check for enlisted repos
        id: check
        env:
          ORG: ${{ steps.params.outputs.org }}
        run: |
          COUNT=$(gh api "search/repositories?q=topic:basecoat-enabled+org:${ORG}&per_page=1" \
            --jq '.total_count' 2>/dev/null || echo "0")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "${COUNT}" == "0" ]]; then
            echo "::warning::No repos found with topic 'basecoat-enabled' in org '${ORG}'."
            echo "::warning::Add the topic to repos to enlist them: docs/memory/enlistment.md"
          fi

      - name: Run memory sweep
        if: steps.check.outputs.count != '0'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pwsh scripts/sweep-enterprise-memory.ps1 \
            -Org "${{ steps.params.outputs.org }}" \
            -DaysBack ${{ steps.params.outputs.days }} \
            -OutputDir "docs/memory/sweep-candidates"

      - name: Check for new candidates
        if: steps.check.outputs.count != '0'
        id: candidates
        run: |
          FILE="docs/memory/sweep-candidates/${{ steps.params.outputs.date }}.md"
          if [[ -f "${FILE}" ]]; then
            COUNT=$(grep -c "^### \[" "${FILE}" || echo "0")
            echo "file=${FILE}"   >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "found=true"     >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and commit candidates
        if: steps.candidates.outputs.found == 'true' && steps.candidates.outputs.count != '0'
        run: |
          BRANCH="${{ steps.params.outputs.branch }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add docs/memory/sweep-candidates/
          git commit -m "chore(memory): sweep candidates ${{ steps.params.outputs.date }}

Auto-generated by enterprise memory sweep.
Org: ${{ steps.params.outputs.org }} | Days back: ${{ steps.params.outputs.days }}
Candidates found: ${{ steps.candidates.outputs.count }}

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "${BRANCH}"

      - name: Open pull request for memory review
        if: steps.candidates.outputs.found == 'true' && steps.candidates.outputs.count != '0'
        env:
          DATE:  ${{ steps.params.outputs.date }}
          ORG:   ${{ steps.params.outputs.org }}
          COUNT: ${{ steps.candidates.outputs.count }}
          DAYS:  ${{ steps.params.outputs.days }}
          FILE:  ${{ steps.candidates.outputs.file }}
          BRANCH: ${{ steps.params.outputs.branch }}
        run: |
          gh pr create \
            --title "chore(memory): sweep candidates ${DATE} (${COUNT} candidates)" \
            --base main \
            --head "${BRANCH}" \
            --label "memory-sweep" \
            --body "## Memory Sweep — ${DATE}

Auto-generated by the weekly enterprise memory sweep.

| | |
|---|---|
| **Org swept** | \`${ORG}\` |
| **Days back** | ${DAYS} |
| **Candidates** | ${COUNT} |
| **File** | \`${FILE}\` |

## Review Instructions

For each candidate in the file:

1. **Keep** — generic enough for other teams, not project-specific
2. **Draft** — fill in the \`Draft memory\` and \`Namespace\` fields (≤200 chars, \`domain:subject\` format)
3. **Promote** — once approved here, copy to \`{org}/basecoat-memory/memories/{domain}/\` via PR

Delete candidates that are too specific, duplicate, or low-value before merging.

## Auto-close

This PR closes automatically if no candidates are promoted within 14 days.
Unreviewed candidates are not lost — they remain in git history.

---

*Triggered by: \`memory-sweep.yml\`  |  Merge after review by memory-curator agent or a memory steward.*"

      - name: Report no-op
        if: steps.check.outputs.count == '0' || steps.candidates.outputs.found == 'false' || steps.candidates.outputs.count == '0'
        run: |
          echo "✅ Memory sweep complete — no new candidates in the last ${{ steps.params.outputs.days }} days."
          echo "   Enlisted repos: ${{ steps.check.outputs.count }}"
