name: Publish to Production

# Syncs tagged releases from internal (IBuySpy-Shared/basecoat) to production (ivegamsft/basecoat)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v3.10.0)"
        required: true
        default: "v3.10.0"

permissions:
  contents: read

concurrency:
  group: publish-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to production repository
        env:
          PRODUCTION_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${PRODUCTION_TOKEN:-}" ]]; then
            echo "::error::PRODUCTION_REPO_TOKEN secret not configured."
            echo "::error::Fix: create a fine-grained PAT signed in as ivegamsft with resource owner=ivegamsft, repo=ivegamsft/basecoat."
            echo "::error::Required permissions: Contents R/W + Administration R/W + Workflows R/W"
            echo "::error::See issue #575 for step-by-step instructions."
            exit 1
          fi

          # Verify the token can push to the production repo before attempting
          REPO_JSON=$(curl -s \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat")

          HTTP_STATUS=$(echo "${REPO_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if d.get('permissions',{}).get('push') else 'nopush')" 2>/dev/null || echo "error")

          if [[ "${HTTP_STATUS}" != "ok" ]]; then
            PUSH_VAL=$(echo "${REPO_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('permissions',{}).get('push','?'))" 2>/dev/null || echo "?")
            echo "::error::PRODUCTION_REPO_TOKEN cannot push to ivegamsft/basecoat (permissions.push=${PUSH_VAL})."
            echo "::error::The PAT must be created by the ivegamsft account owner (not IBuySpy-Shared org)."
            echo "::error::Steps: sign in as ivegamsft → Settings → Fine-grained tokens → resource owner=ivegamsft, repo=ivegamsft/basecoat"
            echo "::error::Permissions needed: Contents R/W + Administration R/W + Workflows R/W"
            echo "::error::Then: gh secret set PRODUCTION_REPO_TOKEN --repo IBuySpy-Shared/basecoat"
            echo "::error::See issue #575 for details."
            exit 1
          fi

          PRODUCTION_REMOTE="https://x-access-token:${PRODUCTION_TOKEN}@github.com/ivegamsft/basecoat.git"
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"

          # Temporarily disable branch protection to allow push
          echo "Disabling branch protection..."
          curl -sf -X DELETE \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat/branches/main/protection" || true

          # Clear any persisted Actions bot credentials so PAT is used for push
          git config --local --unset-all http.https://github.com/.extraheader || true

          # Push the main branch
          git push "${PRODUCTION_REMOTE}" HEAD:refs/heads/main --force

          # Push the tag
          git push "${PRODUCTION_REMOTE}" "refs/tags/${TAG}"

          # Re-enable branch protection
          echo "Re-enabling branch protection..."
          curl -sf -X PUT \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat/branches/main/protection" \
            -d '{"required_status_checks":null,"enforce_admins":false,"required_pull_request_reviews":{"required_approving_review_count":1},"restrictions":null}'

          echo "✅ Pushed ${TAG} to ivegamsft/basecoat"
