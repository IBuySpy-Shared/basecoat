name: Publish to Production

# Syncs tagged releases from internal (IBuySpy-Shared/basecoat) to production (ivegamsft/basecoat)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v3.10.0)"
        required: true
        default: "v3.10.0"

permissions:
  contents: read

concurrency:
  group: publish-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Push to production repository
        env:
          PRODUCTION_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${PRODUCTION_TOKEN:-}" ]]; then
            echo "::error::PRODUCTION_REPO_TOKEN secret not configured."
            echo "::error::Fix: create a fine-grained PAT signed in as ivegamsft with resource owner=ivegamsft, repo=ivegamsft/basecoat, permissions: Contents R/W + Administration R/W."
            echo "::error::See issue #575 for step-by-step instructions."
            exit 1
          fi

          # Verify the token can read the production repo before attempting push
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat")

          if [[ "${HTTP_STATUS}" != "200" ]]; then
            echo "::error::PRODUCTION_REPO_TOKEN cannot access ivegamsft/basecoat (HTTP ${HTTP_STATUS})."
            echo "::error::The PAT must be created by the ivegamsft account (not IBuySpy-Shared)."
            echo "::error::Resource owner: ivegamsft | Repo: ivegamsft/basecoat | Perms: Contents R/W + Administration R/W"
            echo "::error::See issue #575 for step-by-step fix."
            exit 1
          fi

          PRODUCTION_REMOTE="https://x-access-token:${PRODUCTION_TOKEN}@github.com/ivegamsft/basecoat.git"
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"

          # Temporarily disable branch protection to allow push
          echo "Disabling branch protection..."
          curl -sf -X DELETE \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat/branches/main/protection" || true

          # Push the main branch
          git push "${PRODUCTION_REMOTE}" HEAD:refs/heads/main --force

          # Push the tag
          git push "${PRODUCTION_REMOTE}" "refs/tags/${TAG}"

          # Re-enable branch protection
          echo "Re-enabling branch protection..."
          curl -sf -X PUT \
            -H "Authorization: token ${PRODUCTION_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ivegamsft/basecoat/branches/main/protection" \
            -d '{"required_status_checks":null,"enforce_admins":false,"required_pull_request_reviews":{"required_approving_review_count":1},"restrictions":null}'

          echo "✅ Pushed ${TAG} to ivegamsft/basecoat"
