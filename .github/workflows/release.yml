name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build repository zip artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          artifact_name="${GITHUB_REPOSITORY#*/}-${tag}.zip"

          git archive --format=zip --output "${artifact_name}" "${GITHUB_SHA}"

          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Extract release notes for tag version
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="release-notes.md"
          scripts/generate-release-notes.sh "${tag}" "${version}" "${notes_file}"

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          artifact="${{ steps.package.outputs.artifact_name }}"
          notes="${{ steps.notes.outputs.notes_file }}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${artifact}" --clobber --repo "${GITHUB_REPOSITORY}"
            gh release edit "${tag}" --notes-file "${notes}" --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${artifact}" \
              --title "${tag}" \
              --notes-file "${notes}" \
              --repo "${GITHUB_REPOSITORY}"
          fi
