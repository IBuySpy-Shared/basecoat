name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build repository zip artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          artifact_name="${GITHUB_REPOSITORY#*/}-${tag}.zip"

          git archive --format=zip --output "${artifact_name}" "${GITHUB_SHA}"

          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Extract changelog notes for tag version
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="release-notes.md"
          section_file="release-section.md"

          has_section_body() {
            awk '
              NR == 1 { next }
              /^[[:space:]]*$/ { next }
              { found = 1; exit 0 }
              END { exit found ? 0 : 1 }
            ' "$1"
          }

          extract_version_section() {
            awk -v tag="${tag}" -v version="${version}" '
              function trim(s) { sub(/^[ \t]+/, "", s); sub(/[ \t]+$/, "", s); return s }
              BEGIN { capture = 0; found = 0 }
              {
                if ($0 ~ /^##[[:space:]]+/) {
                  heading = $0
                  normalized = heading
                  sub(/^##[[:space:]]+/, "", normalized)
                  gsub(/\[/, "", normalized)
                  gsub(/\]/, "", normalized)
                  split(normalized, parts, " - ")
                  heading_version = trim(parts[1])

                  if (capture == 1) {
                    exit 0
                  }

                  if (heading_version == tag || heading_version == version) {
                    capture = 1
                    found = 1
                    print $0
                    next
                  }
                }

                if (capture == 1) {
                  print $0
                }
              }
              END { if (found == 0) exit 2 }
            ' CHANGELOG.md > "${section_file}"
          }

          extract_unreleased_section() {
            awk '
              BEGIN { capture = 0; found = 0 }
              {
                if ($0 ~ /^##[[:space:]]+/) {
                  heading = $0
                  sub(/^##[[:space:]]+/, "", heading)

                  if (capture == 1) {
                    exit 0
                  }

                  if (heading == "Unreleased") {
                    capture = 1
                    found = 1
                    print $0
                    next
                  }
                }

                if (capture == 1) {
                  print $0
                }
              }
              END { if (found == 0) exit 2 }
            ' CHANGELOG.md > "${section_file}"
          }

          write_git_history_notes() {
            previous_tag="$(git tag --list 'v*.*.*' --sort=-v:refname | grep -Fxv "${tag}" | head -n 1 || true)"
            range="${GITHUB_SHA}"
            from_label="initial commit"

            if [[ -n "${previous_tag}" ]]; then
              range="${previous_tag}..${GITHUB_SHA}"
              from_label="${previous_tag}"
            fi

            {
              printf '## %s\n\n' "${version}"
              printf '_Auto-generated from commit history since %s._\n\n' "${from_label}"
              printf '### Changes\n\n'
              git log --no-merges --pretty='- %s (%h)' "${range}" || true
            } > "${notes_file}"

            if ! grep -q '^-' "${notes_file}"; then
              printf -- '- No commits found in selected range.\n' >> "${notes_file}"
            fi
          }

          if [[ -f CHANGELOG.md ]] && extract_version_section && has_section_body "${section_file}"; then
            cp "${section_file}" "${notes_file}"
          elif [[ -f CHANGELOG.md ]] && extract_unreleased_section && has_section_body "${section_file}"; then
            {
              printf '## %s\n\n' "${version}"
              printf '_Derived from `## Unreleased` in CHANGELOG.md because a `%s` section was not found._\n\n' "${version}"
              tail -n +2 "${section_file}"
            } > "${notes_file}"
          else
            write_git_history_notes
          fi

          rm -f "${section_file}"

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          artifact="${{ steps.package.outputs.artifact_name }}"
          notes="${{ steps.notes.outputs.notes_file }}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${artifact}" --clobber --repo "${GITHUB_REPOSITORY}"
            gh release edit "${tag}" --notes-file "${notes}" --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${artifact}" \
              --title "${tag}" \
              --notes-file "${notes}" \
              --repo "${GITHUB_REPOSITORY}"
          fi
