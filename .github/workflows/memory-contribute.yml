name: Memory Contribute

on:
  workflow_dispatch:
    inputs:
      memories_json_b64:
        description: "Base64-encoded JSON array of memory facts (see scripts/contribute-memories.ps1 for format)"
        required: true
        type: string
      sprint:
        description: "Sprint label (e.g. sprint-20)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run — print formatted memories without opening a PR"
        required: false
        default: false
        type: boolean

# No write permissions on this repo — all writes go to {org}/basecoat-memory
permissions:
  contents: read

# Token strategy:
#   GITHUB_TOKEN       — read this repo (scripts)
#   MEMORY_REPO_TOKEN  — fine-grained PAT scoped to {org}/basecoat-memory
#                        Required permissions on basecoat-memory:
#                          Contents: Read and Write
#                          Pull requests: Read and Write
#                          Metadata: Read (implicit)

jobs:
  contribute:
    name: Contribute memories to basecoat-memory
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out basecoat (scripts only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1

      - name: Resolve sprint label
        id: sprint
        run: |
          SPRINT="${{ inputs.sprint }}"
          if [[ -z "${SPRINT}" ]]; then
            SPRINT="sprint-$(date -u +%Y-%m)"
          fi
          echo "label=${SPRINT}" >> "$GITHUB_OUTPUT"

      - name: Decode memories JSON
        id: decode
        run: |
          echo '${{ inputs.memories_json_b64 }}' | base64 -d > /tmp/memories.json
          COUNT=$(jq length /tmp/memories.json)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Decoded ${COUNT} memory fact(s)"

      - name: Validate JSON structure
        run: |
          jq -e '
            . as $arr |
            if type != "array" then error("root must be an array") else . end |
            .[] | if .subject and .fact then . else error("each item needs subject and fact") end
          ' /tmp/memories.json > /dev/null
          echo "✅ JSON structure valid"

      - name: Contribute memories (dry run)
        if: inputs.dry_run == true
        shell: pwsh
        env:
          BASECOAT_SHARED_MEMORY_REPO: ${{ github.repository_owner }}/basecoat-memory
          GH_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
        run: |
          pwsh scripts/contribute-memories.ps1 `
            -InputFile /tmp/memories.json `
            -Sprint "${{ steps.sprint.outputs.label }}" `
            -DryRun

      - name: Contribute memories (live)
        if: inputs.dry_run != true
        shell: pwsh
        env:
          BASECOAT_SHARED_MEMORY_REPO: ${{ github.repository_owner }}/basecoat-memory
          MEMORY_REPO_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.MEMORY_REPO_TOKEN }}
        run: |
          pwsh scripts/contribute-memories.ps1 `
            -InputFile /tmp/memories.json `
            -Sprint "${{ steps.sprint.outputs.label }}"

      - name: Summary
        if: always()
        run: |
          echo "## Memory Contribution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sprint | ${{ steps.sprint.outputs.label }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Facts decoded | ${{ steps.decode.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target repo | \`${{ github.repository_owner }}/basecoat-memory\` |" >> "$GITHUB_STEP_SUMMARY"
