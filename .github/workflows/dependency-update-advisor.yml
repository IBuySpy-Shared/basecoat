name: "Dependency Update Advisor"

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

run-name: "Dependency Risk Assessment — PR #${{ github.event.pull_request.number }}"

jobs:
  advise:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run on Dependabot PRs
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'dependencies')

    steps:
      - uses: actions/checkout@v4

      - name: Parse PR and assess risk
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            // ── Parse package name and versions ─────────────────────────────
            const bumpMatch = title.match(/(?:bump|update)\s+(.+?)\s+from\s+([\d.]+)\s+to\s+([\d.]+)/i);
            if (!bumpMatch) {
              console.log('Could not parse Dependabot title format — skipping comment');
              return;
            }

            const [, packageName, oldVersion, newVersion] = bumpMatch;
            const oldParts = oldVersion.split('.').map(Number);
            const newParts = newVersion.split('.').map(Number);

            let bumpType = 'PATCH';
            if (newParts[0] > oldParts[0]) bumpType = 'MAJOR';
            else if (newParts[1] > oldParts[1]) bumpType = 'MINOR';

            // ── Assess risk level ────────────────────────────────────────────
            const body = pr.body || '';
            const hasCve = /CVE-\d{4}-\d+/i.test(body) || /CVE-\d{4}-\d+/i.test(title);
            const cveMatch = (body + title).match(/CVE-\d{4}-\d+/i);
            const cveId = cveMatch ? cveMatch[0].toUpperCase() : null;

            let riskLevel = 'LOW';
            if (bumpType === 'MAJOR') riskLevel = 'MEDIUM';
            if (bumpType === 'MAJOR' && hasCve) riskLevel = 'MEDIUM';
            if (hasCve && bumpType === 'PATCH') riskLevel = 'MEDIUM';

            // ── Fetch release notes (best-effort) ────────────────────────────
            let breakingChangesText = '_Breaking change data unavailable — review release notes manually for MAJOR bumps._';
            try {
              // Search GitHub releases for the package if it follows org/repo pattern
              const repoMatch = packageName.match(/^@?([^/]+\/[^/]+)$/);
              if (repoMatch) {
                const releases = await github.rest.repos.listReleases({
                  owner: repoMatch[1].split('/')[0],
                  repo: repoMatch[1].split('/')[1],
                  per_page: 10,
                });
                const relevantReleases = releases.data.filter(r => {
                  const tag = r.tag_name.replace(/^v/, '');
                  return tag >= oldVersion && tag <= newVersion;
                });
                const breaking = relevantReleases
                  .flatMap(r => (r.body || '').split('\n'))
                  .filter(l => /breaking|removed|deprecated|renamed/i.test(l))
                  .slice(0, 5)
                  .map(l => `- ${l.trim()}`);
                if (breaking.length > 0) {
                  breakingChangesText = breaking.join('\n');
                  if (bumpType === 'MAJOR') riskLevel = 'HIGH';
                } else if (relevantReleases.length > 0) {
                  breakingChangesText = 'None detected in release notes.';
                }
              }
            } catch (e) {
              // Release notes unavailable — use default text
            }

            // ── CVE context ──────────────────────────────────────────────────
            const cveText = cveId
              ? `${cveId} — verify fix is included in \`${newVersion}\` release notes.`
              : 'No CVE referenced in this PR.';

            // ── Risk emoji ───────────────────────────────────────────────────
            const riskEmoji = { LOW: '🟢', MEDIUM: '🟡', HIGH: '🔴' }[riskLevel];

            // ── Test suggestions ─────────────────────────────────────────────
            const testSuggestions = [
              'Run the full test suite before merging.',
              bumpType === 'MAJOR' ? `Review the \`${packageName}\` migration guide for ${oldVersion} → ${newVersion}.` : null,
              'Check CI passes on this PR before merging.',
            ].filter(Boolean).map(s => `- ${s}`).join('\n');

            // ── Post comment ─────────────────────────────────────────────────
            const comment = `## 🔍 Dependency Update Risk Assessment

**Package:** \`${packageName}\`
**Bump:** \`${oldVersion}\` → \`${newVersion}\` (\`${bumpType}\`)
**Risk Level:** ${riskEmoji} \`${riskLevel}\`

### Breaking Changes

${breakingChangesText}

### Suggested Test Focus

${testSuggestions}

### CVE Context

${cveText}

---
*Generated by [dependency-update-advisor](../blob/main/agents/dependency-update-advisor.agent.md). Review before merging.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment,
            });

            console.log(`Posted risk assessment: ${riskLevel} (${bumpType} bump of ${packageName})`);
