name: MCP Deploy

on:
  push:
    branches:
      - main
    paths:
      - "mcp/basecoat-metrics/**"
      - "infra/mcp/**"
      - ".github/workflows/mcp-deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: ["prod", "staging"]

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # OIDC for Azure login (if using federated credentials)

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/basecoat-metrics-mcp

jobs:
  build-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: mcp/basecoat-metrics
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure package is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Container Apps pulls without auth — package must be public
          gh api \
            --method PATCH \
            /orgs/${{ github.repository_owner }}/packages/container/basecoat-metrics-mcp \
            -f visibility=public 2>/dev/null || echo "Note: Could not set visibility (may need admin:org scope or manual setting)"

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-push
    environment: ${{ inputs.environment || 'prod' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Azure login
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lowercase owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Deploy / update Bicep infrastructure
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        id: infra
        with:
          resourceGroupName: ${{ secrets.MCP_RESOURCE_GROUP }}
          template: infra/mcp/main.bicep
          parameters: >
            imageTag=${{ needs.build-push.outputs.image_tag }}
            imageRepo=${{ steps.owner.outputs.lc }}/basecoat-metrics-mcp
            metricsBaseUrl=https://${{ steps.owner.outputs.lc }}.github.io/basecoat/metrics
            environment=${{ inputs.environment || 'prod' }}
          deploymentName: mcp-${{ github.run_number }}

      - name: Smoke test — health endpoint
        run: |
          FQDN="${{ steps.infra.outputs.fqdn }}"
          URL="https://${FQDN}/health"
          echo "Smoke testing: ${URL}"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
            echo "  Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" == "200" ]]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts (last status: ${STATUS})"
          exit 1

      - name: Output deployed endpoint
        run: |
          echo "### MCP Deployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ needs.build-push.outputs.image_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Health** | \`https://${{ steps.infra.outputs.fqdn }}/health\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **MCP endpoint** | \`https://${{ steps.infra.outputs.fqdn }}\` |" >> "$GITHUB_STEP_SUMMARY"
