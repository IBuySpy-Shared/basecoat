name: MCP Deploy

on:
  push:
    branches:
      - main
    paths:
      - "mcp/basecoat-metrics/**"
      - "infra/mcp/**"
      - ".github/workflows/mcp-deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mcp/basecoat-metrics/**"
      - "infra/mcp/**"
      - ".github/workflows/mcp-deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: ["prod", "staging"]

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # OIDC for Azure login (if using federated credentials)

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/basecoat-metrics-mcp
  TARGET_ENV: ${{ github.event_name == 'pull_request' && 'staging' || inputs.environment || 'prod' }}

jobs:
  build-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: mcp/basecoat-metrics
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-push
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    environment: ${{ env.TARGET_ENV }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lowercase owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Verify GHCR image pull auth
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin
          docker pull "${{ needs.build-push.outputs.image_ref }}"

      - name: Staging what-if validation
        if: ${{ env.TARGET_ENV == 'staging' }}
        run: |
          az deployment group what-if \
            --resource-group "${{ secrets.MCP_RESOURCE_GROUP }}" \
            --template-file infra/mcp/main.bicep \
            --name "mcp-staging-whatif-${{ github.run_id }}-${{ github.run_attempt }}" \
            --parameters \
              imageTag="${{ needs.build-push.outputs.image_tag }}" \
              imageRepo="${{ steps.owner.outputs.lc }}/basecoat-metrics-mcp" \
              metricsBaseUrl="https://${{ steps.owner.outputs.lc }}.github.io/basecoat/metrics" \
              environment="${{ env.TARGET_ENV }}" \
              registryUsername="${{ github.actor }}" \
              registryPassword="${{ secrets.GITHUB_TOKEN }}" \
            --result-format ResourceIdOnly \
            --no-pretty-print

      - name: Deploy / update Bicep infrastructure
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        id: infra
        with:
          resourceGroupName: ${{ secrets.MCP_RESOURCE_GROUP }}
          template: infra/mcp/main.bicep
          parameters: >
            imageTag=${{ needs.build-push.outputs.image_tag }}
            imageRepo=${{ steps.owner.outputs.lc }}/basecoat-metrics-mcp
            metricsBaseUrl=https://${{ steps.owner.outputs.lc }}.github.io/basecoat/metrics
            environment=${{ env.TARGET_ENV }}
            registryUsername=${{ github.actor }}
            registryPassword=${{ secrets.GITHUB_TOKEN }}
          deploymentName: mcp-${{ github.run_number }}

      - name: Verify Container App readiness
        run: |
          if [[ "${{ env.TARGET_ENV }}" == "prod" ]]; then
            APP_NAME="bcmcp-app"
          else
            APP_NAME="bcmcp-app-${{ env.TARGET_ENV }}"
          fi

          RUNNING_STATUS=$(az containerapp show \
            --resource-group "${{ secrets.MCP_RESOURCE_GROUP }}" \
            --name "${APP_NAME}" \
            --query "properties.runningStatus" -o tsv)
          LATEST_READY_REVISION=$(az containerapp show \
            --resource-group "${{ secrets.MCP_RESOURCE_GROUP }}" \
            --name "${APP_NAME}" \
            --query "properties.latestReadyRevisionName" -o tsv)

          echo "Container App: ${APP_NAME}"
          echo "Running status: ${RUNNING_STATUS}"
          echo "Latest ready revision: ${LATEST_READY_REVISION}"

          if [[ "${RUNNING_STATUS}" != "Running" ]]; then
            echo "::error::Container App is not running (status: ${RUNNING_STATUS})"
            exit 1
          fi

          if [[ -z "${LATEST_READY_REVISION}" || "${LATEST_READY_REVISION}" == "null" ]]; then
            echo "::error::No ready revision detected for ${APP_NAME}"
            exit 1
          fi

      - name: Smoke test — health endpoint
        run: |
          FQDN="${{ steps.infra.outputs.fqdn }}"
          URL="https://${FQDN}/health"
          echo "Smoke testing: ${URL}"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
            echo "  Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" == "200" ]]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts (last status: ${STATUS})"
          exit 1

      - name: Output deployed endpoint
        run: |
          echo "### MCP Deployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ needs.build-push.outputs.image_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${{ env.TARGET_ENV }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Health** | \`https://${{ steps.infra.outputs.fqdn }}/health\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **MCP endpoint** | \`https://${{ steps.infra.outputs.fqdn }}\` |" >> "$GITHUB_STEP_SUMMARY"
