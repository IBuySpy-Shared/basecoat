name: Adoption Metrics

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_METRICS_TOKEN: ${{ secrets.COPILOT_METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          DASHBOARD_ORG: ${{ secrets.DASHBOARD_ORG || github.repository_owner }}
          DASHBOARD_REPOS: ${{ secrets.DASHBOARD_REPOS || format('["{0}"]', github.repository) }}
          OUTPUT_DIR: dashboard/metrics
        run: python scripts/metrics/collect-metrics.py

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to gh-pages branch
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Copy dashboard and metrics files
          git checkout main -- dashboard/index.html 2>/dev/null || true
          cp -r dashboard/metrics/ . 2>/dev/null || true

          git add -A
          git diff --cached --quiet || git commit -m "chore: update adoption metrics [skip ci]"
          git push origin gh-pages

      - name: Post weekly summary
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f dashboard/metrics/SUMMARY.md ]; then
            SUMMARY=$(cat dashboard/metrics/SUMMARY.md)
            gh issue create \
              --repo ${{ github.repository }} \
              --title "Weekly Adoption Metrics — $(date +%Y-%m-%d)" \
              --body "$SUMMARY" \
              --label "metrics"
          fi

      - name: File degradation alerts
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERTS_FILE="dashboard/metrics/alerts.json"
          if [ -f "$ALERTS_FILE" ] && [ "$(cat "$ALERTS_FILE")" != "[]" ]; then
            ALERT_COUNT=$(python3 -c "import json; print(len(json.load(open('$ALERTS_FILE'))))")
            ALERT_BODY=$(python3 -c "
          import json
          alerts = json.load(open('$ALERTS_FILE'))
          lines = ['# Degradation Alerts\n']
          for a in alerts:
              icon = '⚠️' if a['severity'] == 'warning' else 'ℹ️'
              lines.append(f\"- {icon} **{a['type']}**: {a['message']}\")
          print('\n'.join(lines))
          ")
            gh issue create \
              --repo ${{ github.repository }} \
              --title "⚠️ Metrics Degradation Alert — $(date +%Y-%m-%d)" \
              --body "$ALERT_BODY" \
              --label "metrics,degradation"
          fi
