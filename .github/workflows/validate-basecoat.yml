name: Validate BaseCoat

on:
  workflow_call:
    inputs:
      concurrency_group:
        description: 'Concurrency group override — callers can pass a distinct value to avoid collisions with push-to-main validate runs'
        required: false
        type: string
        default: ''
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ inputs.concurrency_group || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  validate-commit-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan commit messages for secrets and PII
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="origin/${{ github.base_ref }}..HEAD"
            git fetch origin "${{ github.base_ref }}" --depth=1
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          else
            range="HEAD~20..HEAD"
          fi

          echo "Scanning commit messages in range: $range"
          bash scripts/scan-commit-messages.sh "$range"

  validate-unix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate with bash
        run: bash scripts/validate-basecoat.sh

      - name: Run bash test suite
        run: bash tests/run-tests.sh

  validate-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate with PowerShell
        shell: pwsh
        run: ./scripts/validate-basecoat.ps1

      - name: Run PowerShell test suite
        shell: pwsh
        run: ./tests/run-tests.ps1

      - name: Registry metadata freshness check (blocking)
        shell: pwsh
        run: ./scripts/validate-basecoat.ps1 -Strict

      - name: Coherence check (blocking)
        shell: pwsh
        run: ./scripts/check-coherence.ps1 -Strict -Category conflicts
