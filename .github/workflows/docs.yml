name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-awesome-pages-plugin

      - name: Validate docs (strict)
        run: python -m mkdocs build --strict

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-awesome-pages-plugin

      - name: Configure site URLs for this repository
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SITE_URL="https://${OWNER}.github.io/${REPO}/"
          REPO_URL="https://github.com/${{ github.repository }}"
          # Substitute any source-repo URLs with this fork's URLs
          sed -i "s|https://ibuyspy-shared.github.io/basecoat/|${SITE_URL}|gI" mkdocs.yml
          sed -i "s|https://github.com/IBuySpy-Shared/basecoat|${REPO_URL}|gI" mkdocs.yml
          sed -i "s|IBuySpy-Shared/basecoat|${{ github.repository }}|g" mkdocs.yml

      - name: Enable GitHub Pages (first run)
        run: |
          gh api --method POST "repos/${{ github.repository }}/pages" \
            --field 'source[branch]=gh-pages' \
            --field 'source[path]=/' 2>/dev/null || true
          gh api --method PATCH "repos/${{ github.repository }}" \
            --field "homepage=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --no-history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
