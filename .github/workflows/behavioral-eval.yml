name: Behavioral Eval

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run behavioral evaluation smoke suite
        shell: pwsh
        run: |
          pwsh scripts/eval-assets.ps1 `
            -CaseFile tests/evals/smoke.behavior.json `
            -OutputDir test-results `
            -SummaryFile test-results/eval-summary.md

      - name: Add summary to job output
        shell: bash
        run: |
          cat test-results/eval-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: behavioral-eval-results
          path: |
            test-results/eval-agents.json
            test-results/eval-summary.md
          retention-days: 7
