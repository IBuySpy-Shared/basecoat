# =============================================================================
# secret-scan.yml — Secret Scanning CI Workflow
# Part of: basecoat Enterprise Governance Framework (Issue #43)
#
# ⚠️  WARN-ONLY POLICY — This workflow NEVER blocks a merge.
#
# RATIONALE:
#   Enterprise policy (branch protection, required checks) may conflict with
#   blocking CI steps that flag secrets. We therefore treat CI scanning as a
#   LOGGING and ANNOTATION layer only. The real enforcement gate is the local
#   pre-commit hook (scripts/install-hooks.sh). See docs/security/SECRET_SCANNING.md.
#
# WHAT THIS DOES:
#   - Runs gitleaks on every PR and push.
#   - On PR: annotates the PR with a summary comment (findings or all-clear).
#   - Always exits 0 (success) so the merge is never blocked by this check.
#   - Uploads a SARIF report as a workflow artifact for audit trail.
#
# DOES NOT REQUIRE:
#   - GitHub Advanced Security (GHAS) / code-scanning licence.
#   - Any secrets or tokens beyond the default GITHUB_TOKEN.
# =============================================================================

name: Secret Scanning (warn only)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments

jobs:
  gitleaks:
    name: Gitleaks — detect secrets
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout — full history so gitleaks can diff against the base branch
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Install gitleaks (pinned version for reproducibility)
      # Update GITLEAKS_VERSION periodically.
      # -----------------------------------------------------------------------
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          FILENAME="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${FILENAME}" \
            -o "${FILENAME}"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o checksums.txt
          grep "$FILENAME" checksums.txt | sha256sum --check
          tar -xzf "${FILENAME}" -C /usr/local/bin gitleaks
          rm -f "${FILENAME}" checksums.txt
          gitleaks version

      # -----------------------------------------------------------------------
      # 3. Run gitleaks
      #    - On PRs: scan only the commits in this PR (base..HEAD)
      #    - On push to main: scan the pushed range
      #    - On workflow_dispatch: scan recent 50 commits
      #    Exit code is captured; the step itself always succeeds (|| true).
      # -----------------------------------------------------------------------
      - name: Run gitleaks scan
        id: scan
        run: |
          REPORT_FILE="gitleaks-report.json"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="origin/${{ github.base_ref }}..HEAD"
            git fetch origin "${{ github.base_ref }}" --depth=1
          elif [[ "${{ github.event_name }}" == "push" && \
                  "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            LOG_OPTS="${{ github.event.before }}..${{ github.sha }}"
          else
            LOG_OPTS="HEAD~50..HEAD"
          fi

          echo "Scanning range: ${LOG_OPTS}"

          # Run gitleaks; capture exit code without failing the step
          set +e
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "${LOG_OPTS}" \
            --report-format json \
            --report-path "${REPORT_FILE}" \
            --no-banner \
            --redact \
            --exit-code 1
          LEAK_EXIT=$?
          set -e

          echo "gitleaks_exit=${LEAK_EXIT}" >> "$GITHUB_OUTPUT"
          echo "report_file=${REPORT_FILE}"  >> "$GITHUB_OUTPUT"

          if [[ $LEAK_EXIT -ne 0 ]]; then
            echo "⚠️  Gitleaks found potential secrets (exit ${LEAK_EXIT}). See report."
          else
            echo "✅  No secrets detected by gitleaks."
          fi

      # -----------------------------------------------------------------------
      # 4. Parse report and build summary
      # -----------------------------------------------------------------------
      - name: Build scan summary
        id: summary
        if: always()
        run: |
          REPORT="${{ steps.scan.outputs.report_file }}"
          EXIT="${{ steps.scan.outputs.gitleaks_exit }}"

          if [[ "$EXIT" == "0" ]]; then
            FINDING_COUNT=0
          else
            # Count findings from JSON report (may be empty if gitleaks errored)
            if [[ -f "$REPORT" ]]; then
              FINDING_COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('$REPORT'))
              print(len(data) if isinstance(data, list) else 0)
          except:
              print('unknown')
          ")
            else
              FINDING_COUNT="unknown"
            fi
          fi

          echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

          {
            echo "## 🔐 Secret Scanning Report"
            echo ""
            if [[ "$EXIT" == "0" ]]; then
              echo "✅ **No secrets detected** — gitleaks scan passed."
            else
              echo "⚠️ **Potential secrets detected** — ${FINDING_COUNT} finding(s)."
              echo ""
              echo "> **This check is WARN-ONLY and does NOT block merging.**"
              echo "> Findings must be reviewed and remediated before the code is"
              echo "> considered production-safe."
              echo ""
              echo "### What to do"
              echo "1. Download the \`gitleaks-report.json\` artifact from this run."
              echo "2. Review each finding — it may be a false positive."
              echo "3. **If it is a real secret**: follow the runbook in"
              echo "   \`docs/security/SECRET_SCANNING.md\` → *I accidentally committed a secret*."
              echo "4. **If it is a false positive**: add an allowlist entry to \`.gitleaks.toml\`"
              echo "   and push an update."
            fi
            echo ""
            echo "---"
            echo "_Scan powered by [gitleaks](https://github.com/gitleaks/gitleaks)."
            echo "Config: \`.gitleaks.toml\`. Workflow: \`secret-scan.yml\`._"
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------------
      # 5. Annotate the PR with a comment (PR events only)
      # -----------------------------------------------------------------------
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const exit = '${{ steps.scan.outputs.gitleaks_exit }}';
            const count = '${{ steps.summary.outputs.finding_count }}';

            let body;
            if (exit === '0') {
              body = [
                '## 🔐 Secret Scanning — All Clear',
                '',
                '✅ **No secrets detected** by gitleaks on this PR.',
                '',
                '_This check is warn-only and does not block merging. Config: `.gitleaks.toml`._',
              ].join('\n');
            } else {
              body = [
                '## ⚠️ Secret Scanning — Findings Detected',
                '',
                `Gitleaks found **${count} potential secret(s)** in this PR.`,
                '',
                '> **This check is WARN-ONLY and does NOT block merging.**',
                '> Review findings before merging to production.',
                '',
                '### Next steps',
                '1. Download `gitleaks-report.json` from the [workflow artifacts](' +
                  `${context.payload.pull_request.html_url}/checks).`,
                '2. If **real secret**: see `docs/security/SECRET_SCANNING.md` → runbook.',
                '3. If **false positive**: add an allowlist entry to `.gitleaks.toml`.',
                '',
                '---',
                '_Config: `.gitleaks.toml` · Workflow: `secret-scan.yml`_',
              ].join('\n');
            }

            // Find existing bot comment to update rather than spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Secret Scanning')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # -----------------------------------------------------------------------
      # 6. Upload SARIF / JSON report as artifact (always, for audit trail)
      # -----------------------------------------------------------------------
      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 90
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 7. Always exit 0 — this check MUST NOT block merges
      # -----------------------------------------------------------------------
      - name: Acknowledge findings (warn only — never block)
        if: always()
        run: |
          EXIT="${{ steps.scan.outputs.gitleaks_exit }}"
          if [[ "$EXIT" != "0" ]]; then
            echo "::warning::Gitleaks detected ${{ steps.summary.outputs.finding_count }} potential secret(s)."
            echo "::warning::This check is WARN-ONLY. See PR comment and workflow summary for details."
          fi
          # Unconditionally exit 0 — enterprise policy proof
          exit 0
