name: Post-Deploy Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: ${{ matrix.os }} smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate sync scripts exist
        shell: bash
        run: |
          test -f sync.ps1 || { echo "::error::sync.ps1 not found"; exit 1; }
          test -f sync.sh  || { echo "::error::sync.sh not found"; exit 1; }

      - name: Validate sync.sh is executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if [[ ! -x sync.sh ]]; then
            echo "::error::sync.sh is not executable"
            exit 1
          fi

      - name: Prepare source and consumer repos (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_REPO="$RUNNER_TEMP/basecoat-source"
          CONSUMER_REPO="$RUNNER_TEMP/basecoat-consumer"

          git clone --no-hardlinks "$GITHUB_WORKSPACE" "$SOURCE_REPO"
          git -C "$SOURCE_REPO" checkout -B ci-ref "$GITHUB_SHA"

          mkdir -p "$CONSUMER_REPO"
          git -C "$CONSUMER_REPO" init

          {
            echo "SOURCE_REPO=$SOURCE_REPO"
            echo "CONSUMER_REPO=$CONSUMER_REPO"
            echo "TARGET_DIR=.github/base-coat"
          } >> "$GITHUB_ENV"

      - name: Prepare source and consumer repos (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sourceRepo = Join-Path $env:RUNNER_TEMP 'basecoat-source'
          $consumerRepo = Join-Path $env:RUNNER_TEMP 'basecoat-consumer'

          git clone --no-hardlinks $env:GITHUB_WORKSPACE $sourceRepo | Out-Null
          git -C $sourceRepo checkout -B ci-ref $env:GITHUB_SHA | Out-Null

          New-Item -Path $consumerRepo -ItemType Directory -Force | Out-Null
          git -C $consumerRepo init | Out-Null

          Add-Content -Path $env:GITHUB_ENV -Value "SOURCE_REPO=$sourceRepo"
          Add-Content -Path $env:GITHUB_ENV -Value "CONSUMER_REPO=$consumerRepo"
          Add-Content -Path $env:GITHUB_ENV -Value "TARGET_DIR=.github/base-coat"

      - name: Run sync and validate (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          max_retries=10
          attempt=0
          until [ $attempt -ge $max_retries ]; do
            attempt=$((attempt + 1))
            echo "=== Attempt $attempt of $max_retries ==="

            # Clean consumer repo between retries
            rm -rf "$CONSUMER_REPO/.github"

            cd "$CONSUMER_REPO"
            output="$(BASECOAT_REPO="$SOURCE_REPO" BASECOAT_REF="ci-ref" BASECOAT_TARGET_DIR="$TARGET_DIR" bash "$GITHUB_WORKSPACE/sync.sh" 2>&1)" && break

            echo "sync.sh failed on attempt $attempt, retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done

          if [ $attempt -ge $max_retries ]; then
            echo "::error::sync.sh failed after $max_retries attempts"
            exit 1
          fi

          echo "$output"
          if [[ "$output" != *"Base Coat synced into $TARGET_DIR"* ]]; then
            echo "::error::Expected success message not found in sync.sh output"
            exit 1
          fi

          # Validate output structure
          target="$CONSUMER_REPO/$TARGET_DIR"
          for item in README.md CHANGELOG.md INVENTORY.md version.json instructions skills prompts agents; do
            if [[ ! -e "$target/$item" ]]; then
              echo "::error::Missing expected item in sync output: $item"
              exit 1
            fi
          done

          # Validate agents were copied
          agent_count=$(find "$target/agents" -name '*.agent.md' | wc -l)
          if [[ $agent_count -eq 0 ]]; then
            echo "::error::No .agent.md files found after sync"
            exit 1
          fi
          echo "Found $agent_count agent files"

          # Validate skills were copied
          skill_count=$(find "$target/skills" -name 'SKILL.md' | wc -l)
          if [[ $skill_count -eq 0 ]]; then
            echo "::error::No SKILL.md files found after sync"
            exit 1
          fi
          echo "Found $skill_count skill files"

          # Validate instructions were copied
          instr_count=$(find "$target/instructions" -name '*.instructions.md' | wc -l)
          if [[ $instr_count -eq 0 ]]; then
            echo "::error::No instruction files found after sync"
            exit 1
          fi
          echo "Found $instr_count instruction files"

          # Validate Copilot-discoverable copies
          for copilot_dir in agents instructions prompts; do
            if [[ ! -d "$CONSUMER_REPO/.github/$copilot_dir" ]]; then
              echo "::error::Copilot-discoverable directory .github/$copilot_dir not created"
              exit 1
            fi
          done

          echo "Linux smoke test passed"

      - name: Run sync and validate (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxRetries = 10
          $attempt = 0
          $success = $false

          while ($attempt -lt $maxRetries) {
            $attempt++
            Write-Host "=== Attempt $attempt of $maxRetries ==="

            # Clean consumer repo between retries
            $ghDir = Join-Path $env:CONSUMER_REPO '.github'
            if (Test-Path $ghDir) { Remove-Item -Path $ghDir -Recurse -Force }

            try {
              Set-Location $env:CONSUMER_REPO
              $env:BASECOAT_REPO = $env:SOURCE_REPO
              $env:BASECOAT_REF = 'ci-ref'
              $env:BASECOAT_TARGET_DIR = $env:TARGET_DIR

              $output = & pwsh -NoProfile -File "$env:GITHUB_WORKSPACE/sync.ps1" 2>&1 | Out-String
              Write-Host $output

              if ($output -notmatch [regex]::Escape("Base Coat synced into $env:TARGET_DIR")) {
                throw 'Expected success message not found'
              }
              $success = $true
              break
            }
            catch {
              $wait = $attempt * 2
              Write-Host "sync.ps1 failed on attempt $attempt, retrying in ${wait}s..."
              Start-Sleep -Seconds $wait
            }
          }

          if (-not $success) {
            throw "sync.ps1 failed after $maxRetries attempts"
          }

          # Validate output structure
          $target = Join-Path $env:CONSUMER_REPO $env:TARGET_DIR
          $expected = @('README.md', 'CHANGELOG.md', 'INVENTORY.md', 'version.json', 'instructions', 'skills', 'prompts', 'agents')
          foreach ($item in $expected) {
            if (-not (Test-Path (Join-Path $target $item))) {
              throw "Missing expected item in sync output: $item"
            }
          }

          # Validate agents, skills, instructions
          $agentCount = (Get-ChildItem -Path (Join-Path $target 'agents') -Filter '*.agent.md' -Recurse).Count
          if ($agentCount -eq 0) { throw 'No .agent.md files found after sync' }
          Write-Host "Found $agentCount agent files"

          $skillCount = (Get-ChildItem -Path (Join-Path $target 'skills') -Filter 'SKILL.md' -Recurse).Count
          if ($skillCount -eq 0) { throw 'No SKILL.md files found after sync' }
          Write-Host "Found $skillCount skill files"

          $instrCount = (Get-ChildItem -Path (Join-Path $target 'instructions') -Filter '*.instructions.md' -Recurse).Count
          if ($instrCount -eq 0) { throw 'No instruction files found after sync' }
          Write-Host "Found $instrCount instruction files"

          # Validate Copilot-discoverable copies
          foreach ($copilotDir in @('agents', 'instructions', 'prompts')) {
            $path = Join-Path $env:CONSUMER_REPO ".github/$copilotDir"
            if (-not (Test-Path $path)) {
              throw "Copilot-discoverable directory .github/$copilotDir not created"
            }
          }

          Write-Host 'Windows smoke test passed'
