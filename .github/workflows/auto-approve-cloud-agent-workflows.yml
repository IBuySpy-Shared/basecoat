name: Auto-approve cloud agent workflows

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: read
  contents: read

concurrency:
  group: cloud-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-approve-workflows:
    if: github.actor == 'app/copilot-swe-agent'
    name: Auto-approve pending workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if workflows require approval
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            
            console.log(`Checking for pending workflows on PR #${prNumber} from app/copilot-swe-agent`);
            
            // Get all pending workflow runs for this PR
            const { data: runsData } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              status: 'requested',
              per_page: 100
            });
            
            // Filter runs associated with this PR
            const pendingRuns = runsData.workflow_runs.filter(run => {
              return run.pull_requests && 
                     run.pull_requests.some(pr => pr.number === prNumber);
            });
            
            if (pendingRuns.length === 0) {
              console.log(`✓ No pending workflows found for PR #${prNumber}`);
              return;
            }
            
            console.log(`Found ${pendingRuns.length} pending workflow(s) for PR #${prNumber}`);
            
            // Approve each pending workflow
            for (const run of pendingRuns) {
              try {
                await github.rest.actions.approveWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
                console.log(`✓ Approved workflow run ${run.id}: ${run.name}`);
              } catch (error) {
                if (error.status === 403) {
                  console.log(`⚠ Cannot approve workflow run ${run.id} — insufficient permissions`);
                  console.log(`  This may require manual approval via GitHub UI`);
                } else {
                  throw error;
                }
              }
            }
