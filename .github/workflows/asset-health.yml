name: Asset Health Report

on:
  schedule:
    - cron: "0 8 * * 1"   # Weekly — every Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      weak_only:
        description: "Show only weak assets (score < 6.0)"
        type: boolean
        default: false
      category:
        description: "Category to audit"
        type: choice
        options: [all, agents, skills, instructions]
        default: all
      open_issue:
        description: "Open a GitHub issue with the report"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Audit asset quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0   # needed for git log age calculation

      - name: Run asset audit (markdown output)
        id: audit
        shell: pwsh
        run: |
          $weakFlag = if ("${{ inputs.weak_only }}" -eq "true") { "-Weak" } else { "" }
          $category = if ("${{ inputs.category }}") { "${{ inputs.category }}" } else { "all" }

          $report = pwsh scripts/audit-assets.ps1 -Format markdown -Category $category $(if ($weakFlag) { $weakFlag })

          # Write to job summary
          $report | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

          # Save for optional issue creation
          $report | Out-File -FilePath /tmp/asset-health-report.md -Encoding utf8

          # Extract grade and avg for outputs
          $jsonData = pwsh scripts/audit-assets.ps1 -Format json -Category $category 2>/dev/null | ConvertFrom-Json
          echo "grade=$($jsonData.overallGrade)" >> $env:GITHUB_OUTPUT
          echo "avg_score=$($jsonData.avgScore)" >> $env:GITHUB_OUTPUT
          echo "red_count=$($jsonData.red)" >> $env:GITHUB_OUTPUT
          echo "total=$($jsonData.totalAssets)" >> $env:GITHUB_OUTPUT

      - name: Print summary to log
        shell: pwsh
        run: |
          Write-Host "Grade:       ${{ steps.audit.outputs.grade }}"
          Write-Host "Avg score:   ${{ steps.audit.outputs.avg_score }} / 10"
          Write-Host "Red assets:  ${{ steps.audit.outputs.red_count }} / ${{ steps.audit.outputs.total }}"

      - name: Open GitHub issue with report
        if: |
          inputs.open_issue == true ||
          (github.event_name == 'schedule' && steps.audit.outputs.grade == 'F')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/asset-health-report.md', 'utf8');
            const grade  = '${{ steps.audit.outputs.grade }}';
            const avg    = '${{ steps.audit.outputs.avg_score }}';
            const red    = '${{ steps.audit.outputs.red_count }}';
            const total  = '${{ steps.audit.outputs.total }}';

            const title = `Asset Health Report — Grade ${grade} (${avg}/10 avg, ${red}/${total} red)`;
            const body  = report + '\n\n---\n_Generated by [asset-health.yml](.github/workflows/asset-health.yml)_';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels: ['asset-health', 'automated-report'],
            });

      - name: Generate dependency graph
        shell: pwsh
        run: |
          $graph = pwsh scripts/graph-dependencies.ps1 -ShowOrphans
          $graph | Out-File -FilePath /tmp/dep-graph.md -Encoding utf8

          # Append to job summary
          $separator = "`n`n---`n`n## Dependency Graph`n`n"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($separator + $graph)

          # Surface orphan count as annotation
          if ($graph -match 'Orphaned nodes \((\d+)') {
            $count = $Matches[1]
            if ([int]$count -gt 0) {
              Write-Host "::warning::$count orphaned asset nodes detected. Run 'pwsh scripts/graph-dependencies.ps1 -ShowOrphans' to review."
            }
          }

      - name: Detect unused assets (non-blocking)
        shell: pwsh
        run: |
          $report = pwsh scripts/find-unused-assets.ps1 -Format markdown -ThresholdDays 90 2>&1

          # Append to job summary
          $separator = "`n`n---`n`n## Unused Assets`n`n"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($separator + $report)

          # Warn (non-blocking) if stale unused assets exist
          if ($report -match '(\d+) exceed the 90-day stale threshold') {
            $count = $Matches[1]
            if ([int]$count -gt 0) {
              Write-Host "::warning::$count assets unreferenced for >90 days. Run 'pwsh scripts/find-unused-assets.ps1' to review."
            }
          }

      - name: Fail workflow if grade is F
        if: steps.audit.outputs.grade == 'F'
        run: |
          echo "::error::Asset library health is grade F (avg ${{ steps.audit.outputs.avg_score }}/10). Run 'pwsh scripts/audit-assets.ps1 -Weak' to investigate."
          exit 1
