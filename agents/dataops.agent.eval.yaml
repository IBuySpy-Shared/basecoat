name: "dataops-routing"
description: "Routing evaluation — validates trigger activation for the dataops agent."
skill: "agents/dataops.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with managing pipeline reliability and data change risk."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle managing pipeline reliability and data change risk?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the dataops agent for managing pipeline reliability and data change risk."
    expect_activation: true
