name: "mcp-developer-routing"
description: "Routing evaluation — validates trigger activation for the mcp-developer agent."
skill: "agents/mcp-developer.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with designing, implementing, or reviewing MCP servers, tool definitions, transport configurations, and client integrations."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle designing, implementing, or reviewing MCP servers, tool definitions, transport configurations, and client integrations?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the mcp-developer agent for designing, implementing, or reviewing MCP servers, tool definitions, transport configurations, and client integrations."
    expect_activation: true
  - id: "neg-1"
    input: "Write a haiku about programming."
    expect_activation: false
  - id: "neg-2"
    input: "Give me a recipe for chocolate chip cookies."
    expect_activation: false
