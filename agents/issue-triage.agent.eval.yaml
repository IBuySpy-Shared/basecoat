name: "issue-triage-routing"
description: "Routing evaluation — validates trigger activation for the issue-triage agent."
skill: "agents/issue-triage.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with triaging GitHub issues — classifying type, assigning priority (P0-P3), applying labels, detecting duplicates, tracking SLAs, and recommending sprint placement."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle triaging GitHub issues — classifying type, assigning priority (P0-P3), applying labels, detecting duplicates, tracking SLAs, and recommending sprint placement?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the issue-triage agent for triaging GitHub issues — classifying type, assigning priority (P0-P3), applying labels, detecting duplicates, tracking SLAs, and recommending sprint placement."
    expect_activation: true
  - id: "neg-1"
    input: "Write a haiku about programming."
    expect_activation: false
  - id: "neg-2"
    input: "Give me a recipe for chocolate chip cookies."
    expect_activation: false
