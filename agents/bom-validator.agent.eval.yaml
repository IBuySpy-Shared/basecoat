name: "bom-validator-routing"
description: "Routing evaluation — validates trigger activation for the bom-validator agent."
skill: "agents/bom-validator.agent.md"
scenarios:
  - id: "pos-1"
    input: "Validate this Workcell intake BOM against the plant registry."
    expect_activation: true
  - id: "pos-2"
    input: "Check for missing cells, invalid resource IDs, and circular dependencies before S2."
    expect_activation: true
  - id: "pos-3"
    input: "Run a CAF naming check on the BOM and return pass or fail."
    expect_activation: true
  - id: "neg-1"
    input: "Generate a sprint retrospective summary."
    expect_activation: false
  - id: "neg-2"
    input: "Build a UI component for the dashboard."
    expect_activation: false
