name: "container-security-routing"
description: "Routing evaluation — validates trigger activation for the container-security agent."
skill: "agents/container-security.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with container and Kubernetes security review for workloads, clusters, or container supply chains. USE FOR: scan container images for CVEs, audit Pod Security Standards, assess Kubernetes runtime security. DO NOT USE FOR: writing application code, network firewall rules."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle container and Kubernetes security review for workloads, clusters, or container supply chains. USE FOR: scan container images for CVEs, audit Pod Security Standards, assess Kubernetes runtime security. DO NOT USE FOR: writing application code, network firewall rules?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the container-security agent for container and Kubernetes security review for workloads, clusters, or container supply chains. USE FOR: scan container images for CVEs, audit Pod Security Standards, assess Kubernetes runtime security. DO NOT USE FOR: writing application code, network firewall rules."
    expect_activation: true
  - id: "neg-1"
    input: "writing application code"
    expect_activation: false
  - id: "neg-2"
    input: "network firewall rules"
    expect_activation: false
