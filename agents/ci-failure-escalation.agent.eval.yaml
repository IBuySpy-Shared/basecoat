name: "ci-failure-escalation-routing"
description: "Routing evaluation — validates trigger activation for the ci-failure-escalation agent."
skill: "agents/ci-failure-escalation.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with gate deploys on CI failures."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle open blocking issues?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the ci-failure-escalation agent for enforce halt-line policy."
    expect_activation: true
  - id: "neg-1"
    input: "fixing failing tests"
    expect_activation: false
  - id: "neg-2"
    input: "writing CI config"
    expect_activation: false
