name: "code-review-routing"
description: "Routing evaluation — validates trigger activation for the code-review agent."
skill: "agents/code-review.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with a structured, multi-step code review workflow with findings prioritized by severity and file references."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle a structured, multi-step code review workflow with findings prioritized by severity and file references?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the code-review agent for a structured, multi-step code review workflow with findings prioritized by severity and file references."
    expect_activation: true
  - id: "neg-1"
    input: "Write a haiku about programming."
    expect_activation: false
  - id: "neg-2"
    input: "Give me a recipe for chocolate chip cookies."
    expect_activation: false
