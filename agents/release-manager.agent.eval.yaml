name: "release-manager-routing"
description: "Routing evaluation — validates trigger activation for the release-manager agent."
skill: "agents/release-manager.agent.md"
scenarios:
  - id: "pos-1"
    input: "I need help with bump semver and publish GitHub release."
    expect_activation: true
  - id: "pos-2"
    input: "Can you handle generate changelog from merged PRs?"
    expect_activation: true
  - id: "pos-3"
    input: "Please use the release-manager agent for create git release tag."
    expect_activation: true
  - id: "neg-1"
    input: "sprint planning"
    expect_activation: false
  - id: "neg-2"
    input: "deployment risk assessment"
    expect_activation: false
